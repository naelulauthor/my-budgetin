<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgetin - Manajemen Keuangan Pribadi</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // Lucide Icon Component Wrapper
        const Icon = ({ name, size = 20, className = "" }) => {
            const [iconSvg, setIconSvg] = useState("");
            
            useEffect(() => {
                if (window.lucide) {
                    const svg = window.lucide.createIcons();
                }
            }, [name]);

            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- DATA DUMMY AWAL ---
        const initialTransactions = [
            { id: '1', type: 'income', amount: 8000000, category: 'Gaji', date: '2026-04-01', description: 'Gaji Bulan April' },
            { id: '2', type: 'expense', amount: 1500000, category: 'Makanan', date: '2026-04-02', description: 'Belanja Bulanan' },
            { id: '3', type: 'expense', amount: 300000, category: 'Transportasi', date: '2026-04-03', description: 'Bensin & Tol' },
            { id: '4', type: 'expense', amount: 500000, category: 'Tagihan', date: '2026-04-05', description: 'Listrik & Internet' },
            { id: '5', type: 'income', amount: 1200000, category: 'Freelance', date: '2026-04-06', description: 'Project Website' },
            { id: '6', type: 'expense', amount: 200000, category: 'Hiburan', date: '2026-04-07', description: 'Nonton Bioskop' },
        ];

        const initialBudgets = {
            'Makanan': 2000000,
            'Transportasi': 800000,
            'Tagihan': 1000000,
            'Hiburan': 500000
        };

        const CATEGORIES = {
            income: ['Gaji', 'Freelance', 'Investasi', 'Lainnya'],
            expense: ['Makanan', 'Transportasi', 'Tagihan', 'Hiburan', 'Kesehatan', 'Belanja', 'Lainnya']
        };

        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        };

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [transactions, setTransactions] = useState(initialTransactions);
            const [budgets, setBudgets] = useState(initialBudgets);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                type: 'expense', amount: '', category: 'Makanan', date: new Date().toISOString().split('T')[0], description: ''
            });

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [isAuthenticated, activeTab, isModalOpen]);

            const { totalIncome, totalExpense, balance, monthlyData, expensesByCategory } = useMemo(() => {
                let income = 0;
                let expense = 0;
                const catExpenses = {};
                const months = {};

                transactions.forEach(trx => {
                    const amt = Number(trx.amount);
                    const dateObj = new Date(trx.date);
                    const monthKey = dateObj.toLocaleString('id-ID', { month: 'short' });

                    if (!months[monthKey]) months[monthKey] = { income: 0, expense: 0 };

                    if (trx.type === 'income') {
                        income += amt;
                        months[monthKey].income += amt;
                    } else {
                        expense += amt;
                        months[monthKey].expense += amt;
                        catExpenses[trx.category] = (catExpenses[trx.category] || 0) + amt;
                    }
                });

                const chartData = Object.keys(months).map(key => ({ name: key, ...months[key] }));
                return { totalIncome: income, totalExpense: expense, balance: income - expense, monthlyData: chartData, expensesByCategory: catExpenses };
            }, [transactions]);

            const handleLogin = (e) => { e.preventDefault(); setIsAuthenticated(true); };
            const handleLogout = () => { setIsAuthenticated(false); setActiveTab('dashboard'); };

            const openModal = (trx = null) => {
                if (trx) { setFormData(trx); setEditingId(trx.id); } 
                else { setFormData({ type: 'expense', amount: '', category: 'Makanan', date: new Date().toISOString().split('T')[0], description: '' }); setEditingId(null); }
                setIsModalOpen(true);
            };

            const saveTransaction = (e) => {
                e.preventDefault();
                const newTrx = { ...formData, id: editingId || Date.now().toString(), amount: Number(formData.amount) };
                if (editingId) setTransactions(transactions.map(t => t.id === editingId ? newTrx : t));
                else setTransactions([newTrx, ...transactions]);
                setIsModalOpen(false);
            };

            const deleteTransaction = (id) => setTransactions(transactions.filter(t => t.id !== id));

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-10 border border-gray-100">
                            <div className="flex justify-center mb-8">
                                <div className="bg-blue-600 p-4 rounded-2xl text-white shadow-lg shadow-blue-200">
                                    <Icon name="wallet" size={36} />
                                </div>
                            </div>
                            <h2 className="text-3xl font-extrabold text-center text-gray-900 mb-2">Budgetin</h2>
                            <p className="text-center text-gray-500 mb-8">Kelola cuan lebih rapi dan terukur.</p>
                            <form onSubmit={handleLogin} className="space-y-5">
                                <div className="space-y-1">
                                    <label className="text-sm font-semibold text-gray-700 ml-1">Email</label>
                                    <input type="email" required defaultValue="user@budgetin.com" className="w-full px-5 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-sm font-semibold text-gray-700 ml-1">Password</label>
                                    <input type="password" required defaultValue="password" className="w-full px-5 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all" />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-100 transition-all active:scale-95">
                                    Masuk Sekarang
                                </button>
                            </form>
                            <p className="text-center text-xs text-gray-400 mt-8 font-medium">MODE DEMO - LANGSUNG KLIK MASUK</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#F8FAFC] flex flex-col md:flex-row text-gray-800">
                    {/* SIDEBAR */}
                    <aside className="w-full md:w-72 bg-white border-r border-gray-200 flex flex-col sticky top-0 h-auto md:h-screen">
                        <div className="p-8 flex items-center gap-4 text-blue-600 font-bold text-2xl">
                            <div className="bg-blue-50 p-2 rounded-lg">
                                <Icon name="wallet" size={28} />
                            </div>
                            <span className="tracking-tight">Budgetin</span>
                        </div>
                        <nav className="flex-1 px-4 space-y-2">
                            {[
                                { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' },
                                { id: 'transactions', icon: 'receipt-text', label: 'Transaksi' },
                                { id: 'budgets', icon: 'target', label: 'Anggaran' },
                            ].map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-200 ${activeTab === item.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-100 font-semibold' : 'text-gray-500 hover:bg-gray-50 hover:text-blue-600'}`}
                                >
                                    <Icon name={item.icon} size={22} />
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-6 mt-auto border-t border-gray-100">
                            <button onClick={handleLogout} className="w-full flex items-center gap-4 px-5 py-3 text-red-500 hover:bg-red-50 rounded-xl transition-all font-medium">
                                <Icon name="log-out" size={20} />
                                Keluar
                            </button>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 p-6 md:p-10 custom-scrollbar overflow-y-auto">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
                            <div>
                                <h1 className="text-3xl font-extrabold text-gray-900 capitalize tracking-tight">{activeTab}</h1>
                                <p className="text-gray-500 font-medium">Pantau dan atur finansialmu hari ini.</p>
                            </div>
                            <button onClick={() => openModal()} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3.5 rounded-2xl font-bold flex items-center gap-3 transition-all shadow-lg shadow-blue-100 active:scale-95">
                                <Icon name="plus" size={22} />
                                <span>Tambah Transaksi</span>
                            </button>
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-8">
                                {/* Dashboard Cards - Perbaikan tampilan sesuai screenshot */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-7 rounded-[2rem] shadow-sm border border-gray-100 relative overflow-hidden flex flex-col justify-center min-h-[140px]">
                                        <div className="absolute top-4 right-4 opacity-10"><Icon name="wallet" size={60} /></div>
                                        <p className="text-gray-400 font-bold text-sm uppercase tracking-wider mb-2">Total Saldo</p>
                                        <h3 className="text-3xl font-extrabold text-gray-900 truncate" title={formatRupiah(balance)}>{formatRupiah(balance)}</h3>
                                    </div>
                                    <div className="bg-white p-7 rounded-[2rem] shadow-sm border border-gray-100 flex flex-col justify-center min-h-[140px]">
                                        <div className="flex items-center gap-3 mb-3 text-emerald-500">
                                            <div className="bg-emerald-50 p-2 rounded-xl"><Icon name="trending-up" size={22} /></div>
                                            <p className="font-bold text-sm uppercase tracking-wider">Pemasukan</p>
                                        </div>
                                        <h3 className="text-3xl font-extrabold text-gray-900 truncate" title={formatRupiah(totalIncome)}>{formatRupiah(totalIncome)}</h3>
                                    </div>
                                    <div className="bg-white p-7 rounded-[2rem] shadow-sm border border-gray-100 flex flex-col justify-center min-h-[140px]">
                                        <div className="flex items-center gap-3 mb-3 text-red-500">
                                            <div className="bg-red-50 p-2 rounded-xl"><Icon name="trending-down" size={22} /></div>
                                            <p className="font-bold text-sm uppercase tracking-wider">Pengeluaran</p>
                                        </div>
                                        <h3 className="text-3xl font-extrabold text-gray-900 truncate" title={formatRupiah(totalExpense)}>{formatRupiah(totalExpense)}</h3>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="lg:col-span-2 bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
                                        <h3 className="text-xl font-bold mb-8 text-gray-900 flex items-center gap-3">
                                            <Icon name="bar-chart-3" className="text-blue-600" />
                                            Arus Kas Bulanan
                                        </h3>
                                        <div className="h-64 flex items-end gap-6 px-4">
                                            {monthlyData.map((data, idx) => {
                                                const maxVal = Math.max(...monthlyData.map(d => Math.max(d.income, d.expense))) || 1;
                                                const incHeight = (data.income / maxVal) * 100;
                                                const expHeight = (data.expense / maxVal) * 100;
                                                return (
                                                    <div key={idx} className="flex-1 flex flex-col justify-end items-center gap-4 group">
                                                        <div className="flex gap-2 w-full justify-center items-end h-48">
                                                            <div className="w-4 bg-emerald-400 rounded-t-lg transition-all hover:bg-emerald-500" style={{ height: `${incHeight}%` }}></div>
                                                            <div className="w-4 bg-red-400 rounded-t-lg transition-all hover:bg-red-500" style={{ height: `${expHeight}%` }}></div>
                                                        </div>
                                                        <span className="text-sm font-bold text-gray-400 uppercase">{data.name}</span>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>

                                    <div className="bg-blue-600 p-8 rounded-[2.5rem] shadow-xl shadow-blue-100 text-white flex flex-col justify-between">
                                        <div>
                                            <div className="flex items-center gap-3 mb-6 text-blue-100">
                                                <Icon name="sparkles" size={24} />
                                                <h3 className="font-bold text-lg">AI Smart Insight</h3>
                                            </div>
                                            {Object.keys(expensesByCategory).length > 0 ? (
                                                <p className="text-xl font-medium leading-relaxed">
                                                    Waduh! Pengeluaranmu paling banyak di <span className="bg-white/20 px-3 py-1 rounded-lg font-bold">{Object.keys(expensesByCategory).reduce((a, b) => expensesByCategory[a] > expensesByCategory[b] ? a : b)}</span>. 
                                                    Coba dikurangi dikit biar tabungan aman ya!
                                                </p>
                                            ) : (
                                                <p className="text-lg opacity-80">Belum ada data nih. Yuk mulai catat pengeluaranmu!</p>
                                            )}
                                        </div>
                                        <button onClick={() => setActiveTab('budgets')} className="mt-10 bg-white text-blue-600 font-bold py-4 rounded-2xl hover:bg-blue-50 transition-all active:scale-95 shadow-lg">
                                            Cek Anggaran
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden">
                                    <div className="p-8 border-b border-gray-50 flex justify-between items-center">
                                        <h3 className="text-xl font-bold text-gray-900">Transaksi Terbaru</h3>
                                        <button onClick={() => setActiveTab('transactions')} className="text-blue-600 font-bold text-sm hover:underline">Lihat Semua</button>
                                    </div>
                                    <div className="divide-y divide-gray-50">
                                        {transactions.slice(0, 5).map(trx => (
                                            <div key={trx.id} className="px-8 py-5 flex items-center justify-between hover:bg-gray-50 transition-all">
                                                <div className="flex items-center gap-5">
                                                    <div className={`p-3.5 rounded-2xl ${trx.type === 'income' ? 'bg-emerald-50 text-emerald-500' : 'bg-red-50 text-red-500'}`}>
                                                        <Icon name={trx.type === 'income' ? 'trending-up' : 'trending-down'} size={24} />
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-gray-900 text-lg">{trx.description}</p>
                                                        <div className="flex gap-3 text-xs font-bold text-gray-400 mt-1 uppercase tracking-wider">
                                                            <span className="bg-gray-100 px-2.5 py-1 rounded-md text-gray-500">{trx.category}</span>
                                                            <span className="py-1">{trx.date}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <span className={`text-xl font-extrabold ${trx.type === 'income' ? 'text-emerald-500' : 'text-gray-900'}`}>
                                                    {trx.type === 'income' ? '+' : '-'}{formatRupiah(trx.amount).replace('Rp', '').trim()}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'transactions' && (
                            <div className="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden">
                                <div className="p-6 border-b border-gray-50 flex flex-col sm:flex-row justify-between gap-4">
                                    <div className="relative w-full sm:w-80">
                                        <Icon name="search" className="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400" size={18} />
                                        <input type="text" placeholder="Cari riwayat transaksi..." className="w-full pl-12 pr-6 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-medium" />
                                    </div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-gray-50/50 text-gray-400 text-xs font-bold uppercase tracking-widest border-b border-gray-50">
                                                <th className="p-8">Tanggal</th>
                                                <th className="p-8">Keterangan</th>
                                                <th className="p-8">Kategori</th>
                                                <th className="p-8">Nominal</th>
                                                <th className="p-8 text-right">Kelola</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-50">
                                            {transactions.map(trx => (
                                                <tr key={trx.id} className="group hover:bg-gray-50/50 transition-all">
                                                    <td className="p-8 text-sm font-bold text-gray-400">{trx.date}</td>
                                                    <td className="p-8 font-bold text-gray-900 text-lg">{trx.description}</td>
                                                    <td className="p-8"><span className="text-xs font-bold bg-gray-100 text-gray-500 px-3 py-1.5 rounded-xl uppercase tracking-wider">{trx.category}</span></td>
                                                    <td className={`p-8 font-extrabold text-xl ${trx.type === 'income' ? 'text-emerald-500' : 'text-gray-900'}`}>
                                                        {trx.type === 'income' ? '+' : '-'}{formatRupiah(trx.amount).replace('Rp', '').trim()}
                                                    </td>
                                                    <td className="p-8 text-right">
                                                        <div className="flex justify-end gap-3 opacity-0 group-hover:opacity-100 transition-all">
                                                            <button onClick={() => openModal(trx)} className="p-2.5 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition-all"><Icon name="edit-2" size={18} /></button>
                                                            <button onClick={() => deleteTransaction(trx.id)} className="p-2.5 bg-red-50 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all"><Icon name="trash-2" size={18} /></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'budgets' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {Object.keys(budgets).map(category => {
                                    const limit = budgets[category];
                                    const spent = expensesByCategory[category] || 0;
                                    const percent = Math.min((spent / limit) * 100, 100);
                                    const isWarning = percent >= 80;
                                    const isDanger = percent >= 100;
                                    return (
                                        <div key={category} className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 hover:shadow-md transition-all">
                                            <div className="flex justify-between items-start mb-6">
                                                <div>
                                                    <h3 className="font-extrabold text-gray-900 text-2xl mb-1">{category}</h3>
                                                    <p className="text-sm font-bold text-gray-400 uppercase tracking-tighter">Terpakai: {formatRupiah(spent)}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-2xl font-extrabold text-gray-900">{formatRupiah(limit)}</p>
                                                    <p className="text-xs font-bold text-gray-400 uppercase tracking-widest">Limit</p>
                                                </div>
                                            </div>
                                            <div className="w-full bg-gray-100 rounded-full h-4 mb-4 overflow-hidden p-1">
                                                <div className={`h-2 rounded-full transition-all duration-700 ${isDanger ? 'bg-red-500' : isWarning ? 'bg-amber-400' : 'bg-blue-500'}`} style={{ width: `${percent}%` }}></div>
                                            </div>
                                            <div className="flex justify-between items-center mt-6">
                                                <span className={`font-bold px-3 py-1 rounded-lg text-sm ${isDanger ? 'bg-red-50 text-red-600' : 'bg-blue-50 text-blue-600'}`}>
                                                    {percent.toFixed(0)}% Digunakan
                                                </span>
                                                <span className="text-gray-400 font-bold text-sm">Sisa: {formatRupiah(Math.max(limit - spent, 0))}</span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {/* MODAL FORM */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-md flex items-center justify-center p-4 z-[999]">
                            <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-lg overflow-hidden border border-white/20">
                                <div className="p-8 border-b border-gray-50 flex justify-between items-center">
                                    <h3 className="font-extrabold text-2xl text-gray-900">{editingId ? 'Edit Transaksi' : 'Transaksi Baru'}</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-gray-400 hover:text-gray-900 transition-all p-2 bg-gray-50 rounded-xl">
                                        <Icon name="x" size={24} />
                                    </button>
                                </div>
                                <form onSubmit={saveTransaction} className="p-8 space-y-6">
                                    <div className="flex p-1.5 bg-gray-100 rounded-2xl gap-1">
                                        <button type="button" onClick={() => setFormData({...formData, type: 'expense', category: CATEGORIES.expense[0]})} className={`flex-1 py-3 rounded-xl font-bold transition-all ${formData.type === 'expense' ? 'bg-white text-red-500 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>Pengeluaran</button>
                                        <button type="button" onClick={() => setFormData({...formData, type: 'income', category: CATEGORIES.income[0]})} className={`flex-1 py-3 rounded-xl font-bold transition-all ${formData.type === 'income' ? 'bg-white text-emerald-500 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>Pemasukan</button>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-1.5">
                                            <label className="text-xs font-bold text-gray-400 uppercase ml-1">Nominal (Rp)</label>
                                            <input type="number" required value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} className="w-full px-5 py-3.5 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-lg" />
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-xs font-bold text-gray-400 uppercase ml-1">Kategori</label>
                                            <select value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})} className="w-full px-5 py-3.5 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                                                {CATEGORIES[formData.type].map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-xs font-bold text-gray-400 uppercase ml-1">Tanggal</label>
                                        <input type="date" required value={formData.date} onChange={(e) => setFormData({...formData, date: e.target.value})} className="w-full px-5 py-3.5 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-xs font-bold text-gray-400 uppercase ml-1">Deskripsi</label>
                                        <input type="text" required value={formData.description} onChange={(e) => setFormData({...formData, description: e.target.value})} className="w-full px-5 py-3.5 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold" />
                                    </div>
                                    <div className="pt-4 flex gap-4">
                                        <button type="submit" className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all active:scale-95">Simpan Transaksi</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
