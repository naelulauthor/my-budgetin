<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budgetin - Manajemen Keuangan Pribadi</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Budgetin">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2563eb">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
            overscroll-behavior-y: contain;
        }
        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04);
        }
        * {
            -webkit-tap-highlight-color: transparent;
        }
        @keyframes modal-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-modal-up {
            animation: modal-up 0.3s ease-out;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in {
            animation: fade-in 0.4s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', { 
                style: 'currency', 
                currency: 'IDR', 
                minimumFractionDigits: 0 
            }).format(number).replace('Rp', 'Rp ').replace(/,/g, '.');
        };

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(() => {
                return localStorage.getItem('budgetin_auth') === 'true';
            });
            const [activeTab, setActiveTab] = useState('dashboard');
            
            // State Utama
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('budgetin_transactions');
                return saved ? JSON.parse(saved) : [];
            });

            const [budgets, setBudgets] = useState(() => {
                const saved = localStorage.getItem('budgetin_budgets');
                return saved ? JSON.parse(saved) : [
                    { category: 'Makanan', limit: 0 },
                    { category: 'Transportasi', limit: 0 },
                    { category: 'Hiburan', limit: 0 },
                    { category: 'Lainnya', limit: 0 }
                ];
            });

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isBudgetModalOpen, setIsBudgetModalOpen] = useState(false);
            
            const [formData, setFormData] = useState({
                type: 'expense', amount: '', category: 'Makanan', date: new Date().toISOString().split('T')[0], description: ''
            });

            // Sinkronisasi LocalStorage
            useEffect(() => {
                localStorage.setItem('budgetin_transactions', JSON.stringify(transactions));
            }, [transactions]);

            useEffect(() => {
                localStorage.setItem('budgetin_budgets', JSON.stringify(budgets));
            }, [budgets]);

            useEffect(() => {
                localStorage.setItem('budgetin_auth', isAuthenticated);
            }, [isAuthenticated]);

            const { totalIncome, totalExpense, balance } = useMemo(() => {
                let income = 0;
                let expense = 0;
                transactions.forEach(trx => {
                    if (trx.type === 'income') income += Number(trx.amount);
                    else expense += Number(trx.amount);
                });
                return { totalIncome: income, totalExpense: expense, balance: income - expense };
            }, [transactions]);

            const getCategoryUsage = (category) => {
                return transactions
                    .filter(t => t.type === 'expense' && t.category === category)
                    .reduce((acc, curr) => acc + Number(curr.amount), 0);
            };

            const handleLogout = () => {
                if(confirm('Apakah Anda ingin keluar?')) {
                    setIsAuthenticated(false);
                }
            };

            // Tampilan Login (Welcome Screen)
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-white md:bg-gray-50">
                        <div className="max-w-md w-full bg-white rounded-[2.5rem] md:card-shadow p-10 text-center border-none md:border md:border-gray-100 animate-fade-in">
                            <div className="bg-blue-600 w-24 h-24 rounded-[2.5rem] flex items-center justify-center text-white mx-auto mb-8 shadow-2xl shadow-blue-200">
                                <Icon name="wallet" size={48} />
                            </div>
                            <h2 className="text-4xl font-black mb-3 tracking-tighter text-gray-900 italic">Budgetin</h2>
                            <p className="text-gray-500 mb-10 font-medium leading-relaxed px-4 text-lg">
                                Kelola pengeluaran harianmu dengan lebih aman dan terencana.
                            </p>
                            <button 
                                onClick={() => setIsAuthenticated(true)} 
                                className="w-full bg-blue-600 text-white font-bold py-5 rounded-[1.5rem] hover:bg-blue-700 transition-all shadow-xl shadow-blue-100 active:scale-95 text-lg flex items-center justify-center gap-3"
                            >
                                <Icon name="lock" size={20} />
                                Masuk Sekarang
                            </button>
                            <p className="mt-8 text-gray-400 text-sm font-bold uppercase tracking-widest">Aman & Privat</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row pb-24 md:pb-0">
                    {/* SIDEBAR DESKTOP */}
                    <aside className="hidden md:flex w-72 bg-white border-r border-gray-100 flex-col p-8 sticky top-0 h-screen">
                        <div className="flex items-center gap-3 text-blue-600 font-bold text-2xl mb-12 px-2">
                            <div className="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-200">
                                <Icon name="wallet" size={24} />
                            </div>
                            <span className="tracking-tighter font-black italic">Budgetin</span>
                        </div>
                        <nav className="space-y-3">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-lg shadow-blue-100' : 'text-gray-400 hover:bg-gray-50'}`}>
                                <Icon name="layout-dashboard" />
                                <span>Dashboard</span>
                            </button>
                            <button onClick={() => setActiveTab('budget')} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all ${activeTab === 'budget' ? 'bg-blue-600 text-white shadow-lg shadow-blue-100' : 'text-gray-400 hover:bg-gray-50'}`}>
                                <Icon name="target" />
                                <span>Anggaran</span>
                            </button>
                            <button onClick={() => setActiveTab('transactions')} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all ${activeTab === 'transactions' ? 'bg-blue-600 text-white shadow-lg shadow-blue-100' : 'text-gray-400 hover:bg-gray-50'}`}>
                                <Icon name="receipt-text" />
                                <span>Riwayat</span>
                            </button>
                        </nav>
                        
                        <div className="mt-auto space-y-4">
                            <div className="bg-blue-50 p-6 rounded-[2rem] border border-blue-100/50">
                                <p className="text-blue-600 font-black text-xs uppercase tracking-widest mb-2 italic">Budgeting Tip</p>
                                <p className="text-blue-900/70 text-sm font-medium leading-relaxed">Limit anggaran membantu kamu tetap hemat bulan ini.</p>
                            </div>
                            <button onClick={handleLogout} className="w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-red-400 hover:bg-red-50 transition-all">
                                <Icon name="log-out" />
                                <span>Keluar</span>
                            </button>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 p-6 md:p-12 max-w-6xl mx-auto w-full">
                        <div className="flex justify-between items-center mb-10">
                            <div>
                                <h1 className="text-3xl font-black text-gray-900 tracking-tighter capitalize">
                                    {activeTab === 'budget' ? 'Anggaran Bulanan' : activeTab === 'transactions' ? 'Riwayat Transaksi' : 'Dashboard'}
                                </h1>
                                <p className="text-gray-400 font-medium mt-1">Status keuangan terkini</p>
                            </div>
                            {activeTab !== 'budget' && (
                                <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 text-white px-6 py-4 rounded-2xl font-bold flex items-center gap-2 hover:bg-blue-700 transition-all shadow-lg shadow-blue-100 active:scale-95">
                                    <Icon name="plus" size={20} /> <span className="hidden sm:inline font-black">Tambah Data</span>
                                </button>
                            )}
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="animate-fade-in">
                                {/* RINGKASAN SALDO */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                                    <div className="bg-blue-600 p-8 rounded-[2.5rem] relative overflow-hidden shadow-2xl shadow-blue-100 text-white md:col-span-1">
                                        <div className="relative z-10">
                                            <p className="text-blue-100 font-bold mb-1 opacity-80">Total Saldo</p>
                                            <h2 className="text-3xl font-black">{formatRupiah(balance)}</h2>
                                        </div>
                                        <Icon name="wallet" size={100} className="absolute -right-4 -bottom-4 text-white/10 rotate-12" />
                                    </div>

                                    <div className="bg-white p-8 rounded-[2.5rem] border border-gray-100 card-shadow flex items-center gap-5">
                                        <div className="bg-emerald-100 p-4 rounded-2xl text-emerald-600">
                                            <Icon name="trending-up" size={24} />
                                        </div>
                                        <div>
                                            <p className="text-gray-400 font-bold text-xs uppercase tracking-widest mb-1">Pemasukan</p>
                                            <h2 className="text-2xl font-black text-emerald-600">{formatRupiah(totalIncome)}</h2>
                                        </div>
                                    </div>

                                    <div className="bg-white p-8 rounded-[2.5rem] border border-gray-100 card-shadow flex items-center gap-5">
                                        <div className="bg-red-100 p-4 rounded-2xl text-red-600">
                                            <Icon name="trending-down" size={24} />
                                        </div>
                                        <div>
                                            <p className="text-gray-400 font-bold text-xs uppercase tracking-widest mb-1">Pengeluaran</p>
                                            <h2 className="text-2xl font-black text-red-600">{formatRupiah(totalExpense)}</h2>
                                        </div>
                                    </div>
                                </div>

                                {/* AKTIVITAS TERBARU */}
                                <div className="bg-white rounded-[2.5rem] border border-gray-100 overflow-hidden card-shadow">
                                    <div className="p-8 border-b border-gray-50 flex justify-between items-center">
                                        <h3 className="font-bold text-xl text-gray-900">Aktivitas Terakhir</h3>
                                        <button onClick={() => setActiveTab('transactions')} className="text-blue-600 font-bold text-sm hover:underline">Lihat Semua</button>
                                    </div>
                                    <div className="divide-y divide-gray-50">
                                        {transactions.length > 0 ? (
                                            transactions.slice(0, 4).map(trx => (
                                                <div key={trx.id} className="p-6 flex items-center justify-between hover:bg-gray-50/50 transition-all">
                                                    <div className="flex items-center gap-5">
                                                        <div className={`p-4 rounded-2xl ${trx.type === 'income' ? 'bg-emerald-50 text-emerald-500' : 'bg-red-50 text-red-500'}`}>
                                                            <Icon name={trx.type === 'income' ? 'arrow-up-right' : 'arrow-down-left'} size={24} />
                                                        </div>
                                                        <div>
                                                            <p className="font-bold text-gray-900 text-lg leading-tight">{trx.description}</p>
                                                            <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mt-1">{trx.category} • {trx.date}</p>
                                                        </div>
                                                    </div>
                                                    <p className={`font-black text-xl ${trx.type === 'income' ? 'text-emerald-500' : 'text-gray-900'}`}>
                                                        {trx.type === 'income' ? '+' : '-'}{formatRupiah(trx.amount).replace('Rp', '').trim()}
                                                    </p>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="p-20 text-center flex flex-col items-center justify-center gap-4">
                                                <div className="bg-gray-50 p-6 rounded-full text-gray-200">
                                                    <Icon name="clipboard-list" size={48} />
                                                </div>
                                                <p className="text-gray-400 font-bold">Data transaksi masih kosong bro.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'budget' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade-in">
                                {budgets.map((b, idx) => {
                                    const used = getCategoryUsage(b.category);
                                    const percent = b.limit > 0 ? Math.min((used / b.limit) * 100, 100) : 0;
                                    const isOverBudget = b.limit > 0 && used > b.limit;
                                    return (
                                        <div key={idx} className={`bg-white p-8 rounded-[2.5rem] border border-gray-100 card-shadow transition-all ${isOverBudget ? 'ring-2 ring-red-500/20' : ''}`}>
                                            <div className="flex justify-between items-start mb-6">
                                                <div>
                                                    <div className="flex items-center gap-2">
                                                        <h4 className="font-black text-2xl text-gray-900 tracking-tighter">{b.category}</h4>
                                                        {isOverBudget && <Icon name="alert-triangle" size={20} className="text-red-500" />}
                                                    </div>
                                                    <p className={`font-bold mt-1 ${isOverBudget ? 'text-red-500' : 'text-gray-400'}`}>
                                                        {isOverBudget ? 'Budget Jebol!' : `Sisa: ${formatRupiah(Math.max(b.limit - used, 0))}`}
                                                    </p>
                                                </div>
                                                <button 
                                                    onClick={() => setIsBudgetModalOpen(b.category)}
                                                    className="bg-gray-100 p-3 rounded-xl text-gray-500 hover:bg-blue-50 hover:text-blue-600 transition-all shadow-sm"
                                                >
                                                    <Icon name="edit-3" size={20} />
                                                </button>
                                            </div>
                                            <div className="w-full bg-gray-100 h-4 rounded-full overflow-hidden mb-4">
                                                <div 
                                                    className={`h-full transition-all duration-700 ease-out ${percent > 90 ? 'bg-red-500' : percent > 70 ? 'bg-orange-500' : 'bg-blue-600'}`} 
                                                    style={{ width: `${percent}%` }}
                                                ></div>
                                            </div>
                                            <div className="flex justify-between text-sm font-black uppercase tracking-widest">
                                                <span className="text-gray-400">Terpakai: {formatRupiah(used)}</span>
                                                <span className="text-gray-900">Limit: {formatRupiah(b.limit)}</span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {activeTab === 'transactions' && (
                            <div className="bg-white rounded-[2.5rem] border border-gray-100 overflow-hidden card-shadow animate-fade-in">
                                <div className="p-8 border-b border-gray-50 flex justify-between items-center">
                                    <h3 className="font-bold text-xl text-gray-900">Riwayat Catatan</h3>
                                    <button 
                                        onClick={() => { if(confirm('Hapus semua data?')) setTransactions([]); }}
                                        className="text-red-500 font-bold text-sm hover:underline"
                                    >
                                        Hapus Semua
                                    </button>
                                </div>
                                <div className="divide-y divide-gray-50">
                                    {transactions.length > 0 ? (
                                        transactions.map(trx => (
                                            <div key={trx.id} className="p-6 flex items-center justify-between hover:bg-gray-50/50 group">
                                                <div className="flex items-center gap-5">
                                                    <div className={`p-4 rounded-2xl ${trx.type === 'income' ? 'bg-emerald-50 text-emerald-500' : 'bg-red-50 text-red-500'}`}>
                                                        <Icon name={trx.type === 'income' ? 'arrow-up-right' : 'arrow-down-left'} size={24} />
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-gray-900 text-lg">{trx.description}</p>
                                                        <p className="text-xs font-bold text-gray-400 uppercase tracking-widest">{trx.category} • {trx.date}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-6">
                                                    <p className={`font-black text-xl ${trx.type === 'income' ? 'text-emerald-500' : 'text-gray-900'}`}>
                                                        {trx.type === 'income' ? '+' : '-'}{formatRupiah(trx.amount).replace('Rp', '').trim()}
                                                    </p>
                                                    <button onClick={() => setTransactions(transactions.filter(t => t.id !== trx.id))} className="text-gray-200 hover:text-red-500 transition-colors p-2 rounded-lg group-hover:text-gray-400">
                                                        <Icon name="trash-2" size={18} />
                                                    </button>
                                                </div>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="p-20 text-center text-gray-400 font-bold italic italic">Tidak ada riwayat untuk ditampilkan.</div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* BOTTOM NAV MOBILE */}
                    <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex items-center justify-around py-5 px-6 z-40 pb-8 rounded-t-[2.5rem] shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
                        <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center gap-1.5 transition-all ${activeTab === 'dashboard' ? 'text-blue-600 scale-110' : 'text-gray-400'}`}>
                            <Icon name="layout-dashboard" size={24} />
                            <span className="text-[10px] font-black uppercase tracking-widest italic">Dashboard</span>
                        </button>
                        <button onClick={() => setActiveTab('budget')} className={`flex flex-col items-center gap-1.5 transition-all ${activeTab === 'budget' ? 'text-blue-600 scale-110' : 'text-gray-400'}`}>
                            <Icon name="target" size={24} />
                            <span className="text-[10px] font-black uppercase tracking-widest italic">Budget</span>
                        </button>
                        <button onClick={() => setActiveTab('transactions')} className={`flex flex-col items-center gap-1.5 transition-all ${activeTab === 'transactions' ? 'text-blue-600 scale-110' : 'text-gray-400'}`}>
                            <Icon name="receipt-text" size={24} />
                            <span className="text-[10px] font-black uppercase tracking-widest italic">Riwayat</span>
                        </button>
                        <button onClick={handleLogout} className="flex flex-col items-center gap-1.5 text-gray-400">
                            <Icon name="log-out" size={24} />
                            <span className="text-[10px] font-black uppercase tracking-widest italic">Keluar</span>
                        </button>
                    </div>

                    {/* MODAL INPUT TRANSAKSI */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-md flex items-end sm:items-center justify-center p-0 sm:p-4 z-50">
                            <div className="bg-white rounded-t-[3rem] sm:rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl animate-modal-up sm:animate-none">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black text-gray-900 tracking-tighter">Catat Keuangan</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-gray-100 p-2 rounded-xl text-gray-500 hover:bg-gray-200 transition-all"><Icon name="x" /></button>
                                </div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    if(!formData.amount || !formData.description) return;
                                    setTransactions([{ ...formData, id: Date.now().toString(), amount: Number(formData.amount) }, ...transactions]);
                                    setIsModalOpen(false);
                                    setFormData({...formData, amount: '', description: ''});
                                }} className="space-y-6">
                                    <div className="flex bg-gray-100 p-2 rounded-2xl">
                                        <button type="button" onClick={() => setFormData({...formData, type: 'expense'})} className={`flex-1 py-4 rounded-xl font-bold transition-all ${formData.type === 'expense' ? 'bg-white shadow-sm text-red-500' : 'text-gray-400'}`}>Pengeluaran</button>
                                        <button type="button" onClick={() => setFormData({...formData, type: 'income'})} className={`flex-1 py-4 rounded-xl font-bold transition-all ${formData.type === 'income' ? 'bg-white shadow-sm text-emerald-500' : 'text-gray-400'}`}>Pemasukan</button>
                                    </div>
                                    
                                    <div className="space-y-2">
                                        <label className="text-[11px] font-black text-gray-400 uppercase ml-2 tracking-widest">Kategori</label>
                                        <select className="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-bold appearance-none cursor-pointer focus:ring-4 focus:ring-blue-100 transition-all" value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})}>
                                            <option>Makanan</option>
                                            <option>Transportasi</option>
                                            <option>Hiburan</option>
                                            <option>Gaji</option>
                                            <option>Investasi</option>
                                            <option>Lainnya</option>
                                        </select>
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[11px] font-black text-gray-400 uppercase ml-2 tracking-widest">Nominal Rupiah</label>
                                        <input type="number" inputMode="numeric" placeholder="0" required className="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 font-black text-2xl text-blue-600 transition-all" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} />
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[11px] font-black text-gray-400 uppercase ml-2 tracking-widest">Keterangan</label>
                                        <input type="text" placeholder="Beli apa hari ini?" required className="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 font-bold transition-all" value={formData.description} onChange={(e) => setFormData({...formData, description: e.target.value})} />
                                    </div>
                                    <button type="submit" className="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-100 mt-6 active:scale-95 transition-all text-lg">Simpan Sekarang</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL SET BUDGET */}
                    {isBudgetModalOpen && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-sm p-10 shadow-2xl scale-in-center">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="text-2xl font-black text-gray-900 tracking-tighter">Set Limit</h3>
                                    <button onClick={() => setIsBudgetModalOpen(false)} className="text-gray-400 hover:text-gray-600"><Icon name="x" /></button>
                                </div>
                                <p className="text-gray-400 font-bold mb-8 uppercase text-xs tracking-widest">Kategori: {isBudgetModalOpen}</p>
                                <input 
                                    id="budgetInput"
                                    type="number" 
                                    inputMode="numeric"
                                    placeholder="0" 
                                    className="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 font-black text-2xl mb-6" 
                                    autoFocus
                                    onKeyDown={(e) => {
                                        if(e.key === 'Enter') {
                                            const val = e.target.value;
                                            setBudgets(budgets.map(b => b.category === isBudgetModalOpen ? {...b, limit: Number(val)} : b));
                                            setIsBudgetModalOpen(false);
                                        }
                                    }}
                                />
                                <button 
                                    onClick={() => {
                                        const val = document.getElementById('budgetInput').value;
                                        setBudgets(budgets.map(b => b.category === isBudgetModalOpen ? {...b, limit: Number(val)} : b));
                                        setIsBudgetModalOpen(false);
                                    }}
                                    className="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-100 active:scale-95 transition-all"
                                >
                                    Terapkan Limit
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
