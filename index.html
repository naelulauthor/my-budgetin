<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budgetin - Pro Edition</title>
    <!-- Tailwind & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- React & Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .active-tab { background: #2563EB; color: white; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); }
        .active-tab-mobile { color: #2563EB; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .transition-all { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICONS (SVG Inline) ---
        const IconWallet = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/>
                <path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/>
            </svg>
        );
        const IconPlus = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" x2="19" y1="12" x2="19" y2="12"/></svg>;
        const IconDashboard = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="15" rx="1"/></svg>;
        const IconHistory = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M3 10h18"/><path d="M3 6h18"/><path d="M3 14h18"/><path d="M3 18h18"/></svg>;
        const IconTarget = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const IconLogout = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;

        const CATEGORIES = {
            income: ['Gaji', 'Freelance', 'Investasi', 'Lainnya'],
            expense: ['Makanan', 'Transportasi', 'Tagihan', 'Hiburan', 'Kesehatan', 'Belanja', 'Lainnya']
        };

        const App = () => {
            const [user, setUser] = useState(function() {
                var saved = localStorage.getItem('budgetin_user');
                return saved ? JSON.parse(saved) : null;
            });
            const [isAuthenticated, setIsAuthenticated] = useState(function() {
                return localStorage.getItem('budgetin_is_logged_in') === 'true';
            });
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isRegisterMode, setIsRegisterMode] = useState(false);
            const [authError, setAuthError] = useState('');
            const [transactions, setTransactions] = useState(function() {
                var saved = localStorage.getItem('budgetin_transactions');
                return saved ? JSON.parse(saved) : [];
            });
            const [budgets, setBudgets] = useState({
                'Makanan': 2000000,
                'Transportasi': 800000,
                'Tagihan': 1500000,
                'Hiburan': 500000
            });
            const [formData, setFormData] = useState({ 
                type: 'expense', amount: '', category: 'Makanan', note: '' 
            });

            useEffect(function() {
                localStorage.setItem('budgetin_transactions', JSON.stringify(transactions));
                localStorage.setItem('budgetin_is_logged_in', isAuthenticated);
            }, [transactions, isAuthenticated]);

            const stats = useMemo(function() {
                var income = 0;
                var expense = 0;
                var catExpenses = {};
                
                transactions.forEach(function(t) {
                    var amt = Number(t.amount);
                    if (t.type === 'income') {
                        income += amt;
                    } else {
                        expense += amt;
                        catExpenses[t.category] = (catExpenses[t.category] || 0) + amt;
                    }
                });

                return { income: income, expense: expense, balance: income - expense, catExpenses: catExpenses };
            }, [transactions]);

            const formatRupiah = function(num) {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
            };

            const handleAuth = function(e) {
                e.preventDefault();
                setAuthError('');
                var username = e.target.username.value;
                var password = e.target.password.value;

                if (isRegisterMode) {
                    var newUser = { username: username, password: password };
                    localStorage.setItem('budgetin_user', JSON.stringify(newUser));
                    setUser(newUser);
                    setIsRegisterMode(false);
                } else {
                    if (user && username === user.username && password === user.password) {
                        setIsAuthenticated(true);
                    } else if (!user && username === 'admin' && password === 'admin') {
                         setIsAuthenticated(true);
                    } else {
                        setAuthError('Kredensial tidak valid');
                    }
                }
            };

            const handleSubmit = function(e) {
                e.preventDefault();
                if (!formData.amount) return;
                var newTransaction = Object.assign({}, formData, {
                    id: Date.now(),
                    date: new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short' })
                });
                setTransactions([newTransaction].concat(transactions));
                setIsModalOpen(false);
                setFormData({ type: 'expense', amount: '', category: 'Makanan', note: '' });
            };

            const deleteTransaction = function(id) {
                setTransactions(transactions.filter(function(t) { return t.id !== id; }));
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50">
                        <div className="w-full max-w-sm bg-white rounded-[2rem] shadow-xl p-8 text-center border border-slate-100">
                            <div className="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 text-white shadow-lg">
                                <IconWallet size={32} />
                            </div>
                            <h1 className="text-3xl font-black text-slate-900 mb-2 tracking-tighter uppercase italic">Budgetin</h1>
                            <p className="text-slate-400 font-medium mb-8 text-sm">
                                {isRegisterMode ? 'Buat akun barumu.' : 'Kelola uangmu dengan cerdas.'}
                            </p>
                            
                            <form onSubmit={handleAuth} className="space-y-3">
                                <input name="username" type="text" placeholder="Username" required className="w-full px-5 py-4 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-sm" />
                                <input name="password" type="password" placeholder="Password" required className="w-full px-5 py-4 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-sm" />
                                {authError && <p className="text-rose-500 text-xs font-bold">{authError}</p>}
                                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all text-sm uppercase tracking-widest mt-2">
                                    {isRegisterMode ? 'Daftar' : 'Login'}
                                </button>
                            </form>
                            
                            <button onClick={function() { setIsRegisterMode(!isRegisterMode); }} className="mt-6 text-blue-600 font-bold text-xs uppercase tracking-tighter opacity-70">
                                {isRegisterMode ? 'Sudah punya akun? Login' : 'Belum punya akun? Daftar'}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row pb-20 md:pb-0">
                    {/* Sidebar Desktop */}
                    <aside className="hidden md:flex w-72 bg-white border-r border-slate-100 p-8 flex-col sticky top-0 h-screen">
                        <div className="flex items-center gap-3 mb-12">
                            <div className="bg-blue-600 p-2 rounded-xl text-white"><IconWallet size={20} /></div>
                            <span className="text-xl font-black text-blue-600 italic tracking-tighter uppercase">BUDGETIN</span>
                        </div>
                        <nav className="space-y-2 flex-grow">
                            <button onClick={function() { setActiveTab('dashboard'); }} className={"w-full flex items-center gap-3 px-5 py-4 rounded-xl font-bold transition-all " + (activeTab === 'dashboard' ? 'active-tab' : 'text-slate-400 hover:bg-slate-50')}>
                                <IconDashboard /> Dashboard
                            </button>
                            <button onClick={function() { setActiveTab('history'); }} className={"w-full flex items-center gap-3 px-5 py-4 rounded-xl font-bold transition-all " + (activeTab === 'history' ? 'active-tab' : 'text-slate-400 hover:bg-slate-50')}>
                                <IconHistory /> Riwayat
                            </button>
                            <button onClick={function() { setActiveTab('budget'); }} className={"w-full flex items-center gap-3 px-5 py-4 rounded-xl font-bold transition-all " + (activeTab === 'budget' ? 'active-tab' : 'text-slate-400 hover:bg-slate-50')}>
                                <IconTarget /> Anggaran
                            </button>
                        </nav>
                        <button onClick={function() { setIsAuthenticated(false); }} className="text-rose-500 font-bold px-5 py-4 rounded-xl hover:bg-rose-50 flex items-center gap-3 mt-auto">
                            <IconLogout /> Keluar
                        </button>
                    </aside>

                    {/* Bottom Nav Mobile */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 px-6 py-3 flex justify-between items-center z-40 safe-area-bottom">
                        <button onClick={function() { setActiveTab('dashboard'); }} className={"flex flex-col items-center gap-1 " + (activeTab === 'dashboard' ? 'active-tab-mobile' : 'text-slate-300')}>
                            <IconDashboard /> <span className="text-[10px] font-bold uppercase">Home</span>
                        </button>
                        <button onClick={function() { setActiveTab('history'); }} className={"flex flex-col items-center gap-1 " + (activeTab === 'history' ? 'active-tab-mobile' : 'text-slate-300')}>
                            <IconHistory /> <span className="text-[10px] font-bold uppercase">History</span>
                        </button>
                        <button 
                            onClick={function() { setIsModalOpen(true); }}
                            className="bg-blue-600 text-white p-4 rounded-2xl shadow-lg shadow-blue-200 -mt-12 border-4 border-slate-50"
                        >
                            <IconPlus />
                        </button>
                        <button onClick={function() { setActiveTab('budget'); }} className={"flex flex-col items-center gap-1 " + (activeTab === 'budget' ? 'active-tab-mobile' : 'text-slate-300')}>
                            <IconTarget /> <span className="text-[10px] font-bold uppercase">Budget</span>
                        </button>
                        <button onClick={function() { setIsAuthenticated(false); }} className="flex flex-col items-center gap-1 text-rose-300">
                            <IconLogout /> <span className="text-[10px] font-bold uppercase">Exit</span>
                        </button>
                    </nav>

                    {/* Content */}
                    <main className="flex-grow p-5 md:p-12 overflow-x-hidden">
                        <div className="max-w-4xl mx-auto">
                            <header className="flex items-center justify-between mb-8 md:mb-12">
                                <div>
                                    <h2 className="text-2xl md:text-4xl font-black text-slate-900 tracking-tighter uppercase italic">
                                        {activeTab === 'dashboard' ? 'Overview' : activeTab === 'history' ? 'History' : 'Budget'}
                                    </h2>
                                    <p className="text-slate-400 text-xs md:text-sm font-bold uppercase tracking-widest mt-1">
                                        Hai, {(user && user.username) || 'Admin'}
                                    </p>
                                </div>
                                <button 
                                    onClick={function() { setIsModalOpen(true); }}
                                    className="hidden md:flex bg-blue-600 text-white font-black px-6 py-4 rounded-xl shadow-lg hover:bg-blue-700 items-center gap-2 transition-all"
                                >
                                    <IconPlus /> Tambah Transaksi
                                </button>
                            </header>

                            {activeTab === 'dashboard' && (
                                <React.Fragment>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8 md:mb-12">
                                        <div className="bg-blue-600 rounded-[2rem] p-8 text-white shadow-xl shadow-blue-100 md:col-span-1">
                                            <p className="text-[10px] font-bold uppercase tracking-[0.2em] opacity-70 mb-1">Total Saldo</p>
                                            <h3 className="text-2xl md:text-3xl font-black truncate">{formatRupiah(stats.balance)}</h3>
                                        </div>
                                        <div className="bg-white rounded-[2rem] p-6 border border-slate-100 flex items-center gap-4">
                                            <div className="bg-emerald-50 p-3 rounded-xl text-emerald-500"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M12 5v14M5 12h14"/></svg></div>
                                            <div>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Income</p>
                                                <h4 className="text-lg font-black text-slate-800">{formatRupiah(stats.income)}</h4>
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-[2rem] p-6 border border-slate-100 flex items-center gap-4">
                                            <div className="bg-rose-50 p-3 rounded-xl text-rose-500"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M5 12h14"/></svg></div>
                                            <div>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Expense</p>
                                                <h4 className="text-lg font-black text-slate-800">{formatRupiah(stats.expense)}</h4>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-[2.5rem] p-6 md:p-8 border border-slate-100 shadow-sm">
                                        <div className="flex items-center justify-between mb-6">
                                            <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest italic">Aktivitas Terakhir</h3>
                                            <button onClick={function() { setActiveTab('history'); }} className="text-[10px] font-black text-blue-600 uppercase">Lihat Semua</button>
                                        </div>
                                        <div className="space-y-3">
                                            {transactions.length === 0 ? (
                                                <div className="py-12 text-center text-slate-300 font-bold uppercase text-[10px] tracking-widest">Belum ada data...</div>
                                            ) : (
                                                transactions.slice(0, 5).map(function(t) {
                                                    return (
                                                        <div key={t.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl hover:bg-blue-50/50 transition-colors">
                                                            <div className="flex items-center gap-3">
                                                                <div className={"w-10 h-10 rounded-xl flex items-center justify-center text-xs font-black " + (t.type === 'income' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600')}>
                                                                    {t.type === 'income' ? 'IN' : 'OUT'}
                                                                </div>
                                                                <div className="max-w-[120px] md:max-w-none">
                                                                    <p className="font-bold text-slate-800 text-xs truncate uppercase">{t.note || t.category}</p>
                                                                    <p className="text-[8px] font-bold text-slate-400 uppercase tracking-widest">{t.date} • {t.category}</p>
                                                                </div>
                                                            </div>
                                                            <div className={"text-sm font-black " + (t.type === 'income' ? 'text-emerald-500' : 'text-rose-500')}>
                                                                {t.type === 'income' ? '+' : '-'}{formatRupiah(t.amount)}
                                                            </div>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>
                                </React.Fragment>
                            )}

                            {activeTab === 'history' && (
                                <div className="space-y-3">
                                    {transactions.map(function(t) {
                                        return (
                                            <div key={t.id} className="bg-white p-5 rounded-[1.5rem] border border-slate-100 flex items-center justify-between">
                                                <div className="flex items-center gap-4">
                                                    <div className={"w-10 h-10 rounded-xl flex items-center justify-center text-xs font-black " + (t.type === 'income' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600')}>
                                                        {t.type === 'income' ? '↓' : '↑'}
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-slate-800 text-xs uppercase">{t.note || t.category}</p>
                                                        <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">{t.date} • {t.category}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <span className={"font-black text-xs " + (t.type === 'income' ? 'text-emerald-500' : 'text-rose-500')}>
                                                        {formatRupiah(t.amount)}
                                                    </span>
                                                    <button onClick={function() { deleteTransaction(t.id); }} className="text-rose-300 p-1"><IconTrash /></button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                            {activeTab === 'budget' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {Object.keys(budgets).map(function(category) {
                                        var spent = stats.catExpenses[category] || 0;
                                        var limit = budgets[category];
                                        var percent = Math.min((spent / limit) * 100, 100);
                                        var isOver = spent > limit;

                                        return (
                                            <div key={category} className="bg-white p-6 rounded-[2rem] border border-slate-100">
                                                <div className="flex justify-between items-start mb-4">
                                                    <h4 className="font-black text-sm text-slate-800 uppercase italic">{category}</h4>
                                                    <span className="font-black text-blue-600 text-xs">{formatRupiah(limit)}</span>
                                                </div>
                                                <div className="w-full bg-slate-50 h-2 rounded-full overflow-hidden mb-3">
                                                    <div className={"h-full transition-all duration-1000 " + (isOver ? 'bg-rose-500' : 'bg-blue-600')} style={{ width: percent + '%' }}></div>
                                                </div>
                                                <div className="flex justify-between items-center text-[8px] font-black uppercase tracking-widest">
                                                    <span className={isOver ? 'text-rose-500' : 'text-slate-400'}>{formatRupiah(spent)} terpakai</span>
                                                    <span className={isOver ? 'text-rose-500' : 'text-slate-400'}>{percent.toFixed(0)}%</span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modal Overlay - Fullscreen Mobile */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-end md:items-center justify-center">
                            <div className="bg-white w-full max-w-xl md:rounded-[3rem] rounded-t-[2.5rem] p-8 md:p-12 animate-in slide-in-from-bottom duration-300 overflow-y-auto max-h-[90vh]">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-xl md:text-2xl font-black text-slate-900 italic uppercase">Input Data</h3>
                                    <button onClick={function() { setIsModalOpen(false); }} className="text-slate-300 font-bold p-2">✕</button>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div className="flex p-1 bg-slate-100 rounded-xl">
                                        <button type="button" onClick={function() { setFormData(Object.assign({}, formData, {type: 'income', category: 'Gaji'})); }} className={"flex-1 py-3 rounded-lg font-black text-[10px] uppercase tracking-widest transition-all " + (formData.type === 'income' ? 'bg-white shadow text-emerald-600' : 'text-slate-400')}>Pemasukan</button>
                                        <button type="button" onClick={function() { setFormData(Object.assign({}, formData, {type: 'expense', category: 'Makanan'})); }} className={"flex-1 py-3 rounded-lg font-black text-[10px] uppercase tracking-widest transition-all " + (formData.type === 'expense' ? 'bg-white shadow text-rose-600' : 'text-slate-400')}>Pengeluaran</button>
                                    </div>
                                    
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nominal</label>
                                        <input type="number" placeholder="0" className="w-full text-3xl font-black py-4 bg-transparent border-b-2 border-slate-100 focus:border-blue-600 outline-none text-blue-600" value={formData.amount} onChange={function(e) { setFormData(Object.assign({}, formData, {amount: e.target.value})); }} required />
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Kategori</label>
                                            <select className="w-full p-4 bg-slate-50 rounded-xl mt-1 font-bold text-xs appearance-none outline-none" value={formData.category} onChange={function(e) { setFormData(Object.assign({}, formData, {category: e.target.value})); }}>
                                                {CATEGORIES[formData.type].map(function(c) { return <option key={c} value={c}>{c}</option>; })}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Catatan</label>
                                            <input type="text" placeholder="..." className="w-full p-4 bg-slate-50 rounded-xl mt-1 font-bold text-xs outline-none" value={formData.note} onChange={function(e) { setFormData(Object.assign({}, formData, {note: e.target.value})); }} />
                                        </div>
                                    </div>

                                    <button className="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-100 uppercase tracking-widest text-xs mt-4">Simpan Transaksi</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
