<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgetin - Pro Edition</title>
    <!-- Tailwind & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- React & Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFDFF; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .active-tab { background: #2563EB; color: white; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICONS (SVG Inline for Compatibility) ---
        const IconWallet = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/>
                <path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/>
            </svg>
        );
        const IconPlus = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" x2="19" y1="12" x2="19" y2="12"/></svg>;
        const IconDashboard = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="15" rx="1"/></svg>;
        const IconHistory = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M3 10h18"/><path d="M3 6h18"/><path d="M3 14h18"/><path d="M3 18h18"/></svg>;
        const IconTarget = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;

        const CATEGORIES = {
            income: ['Gaji', 'Freelance', 'Investasi', 'Lainnya'],
            expense: ['Makanan', 'Transportasi', 'Tagihan', 'Hiburan', 'Kesehatan', 'Belanja', 'Lainnya']
        };

        const App = () => {
            // --- AUTH STATE ---
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem('budgetin_user');
                return saved ? JSON.parse(saved) : null;
            });
            const [isAuthenticated, setIsAuthenticated] = useState(() => {
                return localStorage.getItem('budgetin_is_logged_in') === 'true';
            });
            const [isRegisterMode, setIsRegisterMode] = useState(false);
            const [authError, setAuthError] = useState('');

            // --- APP STATE ---
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('budgetin_transactions');
                return saved ? JSON.parse(saved) : [];
            });
            const [budgets, setBudgets] = useState({
                'Makanan': 2000000,
                'Transportasi': 800000,
                'Tagihan': 1500000,
                'Hiburan': 500000
            });
            const [formData, setFormData] = useState({ 
                type: 'expense', amount: '', category: 'Makanan', note: '' 
            });

            // --- PERSISTENCE ---
            useEffect(() => {
                localStorage.setItem('budgetin_transactions', JSON.stringify(transactions));
                localStorage.setItem('budgetin_is_logged_in', isAuthenticated);
            }, [transactions, isAuthenticated]);

            // --- CALCULATIONS ---
            const stats = useMemo(() => {
                const income = transactions.filter(t => t.type === 'income').reduce((a, b) => a + Number(b.amount), 0);
                const expense = transactions.filter(t => t.type === 'expense').reduce((a, b) => a + Number(b.amount), 0);
                
                const catExpenses = {};
                transactions.filter(t => t.type === 'expense').forEach(t => {
                    catExpenses[t.category] = (catExpenses[t.category] || 0) + Number(t.amount);
                });

                return { income, expense, balance: income - expense, catExpenses };
            }, [transactions]);

            const formatRupiah = (num) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
            };

            // --- HANDLERS ---
            const handleAuth = (e) => {
                e.preventDefault();
                setAuthError('');
                const username = e.target.username.value;
                const password = e.target.password.value;

                if (isRegisterMode) {
                    const newUser = { username, password };
                    localStorage.setItem('budgetin_user', JSON.stringify(newUser));
                    setUser(newUser);
                    setIsRegisterMode(false);
                    alert('Akun berhasil dibuat! Silakan login.');
                } else {
                    if (user && username === user.username && password === user.password) {
                        setIsAuthenticated(true);
                    } else if (!user && username === 'admin' && password === 'admin') {
                         setIsAuthenticated(true);
                    } else {
                        setAuthError('Username atau Password salah!');
                    }
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.amount) return;
                const newTransaction = { 
                    ...formData, 
                    id: Date.now(), 
                    date: new Date().toLocaleDateString('id-ID') 
                };
                setTransactions([newTransaction, ...transactions]);
                setIsModalOpen(false);
                setFormData({ type: 'expense', amount: '', category: 'Makanan', note: '' });
            };

            const deleteTransaction = (id) => {
                setTransactions(transactions.filter(t => t.id !== id));
            };

            // --- RENDER LOGIN ---
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-blue-50">
                        <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10 text-center border border-slate-100">
                            <div className="bg-blue-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl shadow-blue-200 text-white">
                                <IconWallet size={40} />
                            </div>
                            <h1 className="text-4xl font-black text-slate-900 mb-2 italic tracking-tighter uppercase">Budgetin</h1>
                            <p className="text-slate-400 font-medium mb-10 tracking-tight">
                                {isRegisterMode ? 'Buat akun barumu sekarang.' : 'Kelola keuanganmu dengan gaya.'}
                            </p>
                            
                            <form onSubmit={handleAuth} className="space-y-4">
                                <input name="username" type="text" placeholder="Username" required className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none font-bold" />
                                <input name="password" type="password" placeholder="Password" required className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none font-bold" />
                                {authError && <p className="text-rose-500 text-sm font-bold">{authError}</p>}
                                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-xl shadow-blue-200 hover:scale-[1.02] active:scale-95 transition-all text-lg uppercase tracking-wider">
                                    {isRegisterMode ? 'Daftar' : 'Masuk Sekarang'}
                                </button>
                            </form>
                            
                            <button 
                                onClick={() => { setIsRegisterMode(!isRegisterMode); setAuthError(''); }}
                                className="mt-8 text-blue-600 font-bold text-sm hover:underline"
                            >
                                {isRegisterMode ? 'Sudah punya akun? Login' : 'Belum punya akun? Daftar gratis'}
                            </button>
                        </div>
                    </div>
                );
            }

            // --- RENDER MAIN APP ---
            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <aside className="w-full md:w-80 bg-white border-r border-slate-100 p-8 flex flex-col sticky top-0 h-screen overflow-y-auto">
                        <div className="flex items-center gap-3 mb-16 px-4">
                            <div className="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-200"><IconWallet size={24} /></div>
                            <span className="text-2xl font-black text-blue-600 italic tracking-tighter uppercase">BUDGETIN</span>
                        </div>

                        <nav className="space-y-4 flex-grow">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-4 px-6 py-5 rounded-2xl font-bold transition-all ${activeTab === 'dashboard' ? 'active-tab' : 'text-slate-400 hover:bg-slate-50'}`}>
                                <IconDashboard /> Dashboard
                            </button>
                            <button onClick={() => setActiveTab('history')} className={`w-full flex items-center gap-4 px-6 py-5 rounded-2xl font-bold transition-all ${activeTab === 'history' ? 'active-tab' : 'text-slate-400 hover:bg-slate-50'}`}>
                                <IconHistory /> Riwayat
                            </button>
                            <button onClick={() => setActiveTab('budget')} className={`w-full flex items-center gap-4 px-6 py-5 rounded-2xl font-bold transition-all ${activeTab === 'budget' ? 'active-tab' : 'text-slate-400 hover:bg-slate-50'}`}>
                                <IconTarget /> Anggaran
                            </button>
                        </nav>
                        
                        <button onClick={() => setIsAuthenticated(false)} className="mt-10 text-rose-500 font-bold px-6 py-4 rounded-2xl hover:bg-rose-50 transition-all text-left">Keluar</button>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-grow p-6 md:p-12 overflow-y-auto">
                        <div className="max-w-5xl mx-auto">
                            <header className="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
                                <div>
                                    <h2 className="text-4xl font-black text-slate-900 tracking-tighter uppercase mb-1">
                                        {activeTab === 'dashboard' ? 'Dashboard' : activeTab === 'history' ? 'Riwayat' : 'Anggaran'}
                                    </h2>
                                    <p className="text-slate-400 font-medium tracking-tight">Halo, {(user && user.username) || 'Admin'}! 👋</p>
                                </div>
                                <button 
                                    onClick={() => setIsModalOpen(true)}
                                    className="bg-blue-600 text-white font-black px-10 py-5 rounded-2xl shadow-2xl shadow-blue-200 hover:bg-blue-700 flex items-center justify-center gap-2 transition-all transform hover:-translate-y-1"
                                >
                                    <IconPlus /> Tambah Catatan
                                </button>
                            </header>

                            {activeTab === 'dashboard' && (
                                <React.Fragment>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
                                        <div className="bg-blue-600 rounded-[3rem] p-10 text-white shadow-2xl shadow-blue-200 relative overflow-hidden group">
                                            <div className="relative z-10">
                                                <p className="text-xs font-bold uppercase tracking-[0.2em] opacity-70 mb-2 text-blue-100">Total Saldo</p>
                                                <h3 className="text-4xl font-black leading-none">{formatRupiah(stats.balance)}</h3>
                                            </div>
                                            <div className="absolute -right-4 -bottom-4 opacity-10 group-hover:rotate-12 transition-transform scale-150"><IconWallet size={120} /></div>
                                        </div>
                                        <div className="bg-white rounded-[3rem] p-10 shadow-sm border border-slate-100 flex items-center gap-6">
                                            <div className="bg-emerald-50 p-4 rounded-2xl text-emerald-500">
                                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M12 5v14M5 12h14"/></svg>
                                            </div>
                                            <div>
                                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Pemasukan</p>
                                                <h4 className="text-2xl font-black text-slate-800">{formatRupiah(stats.income)}</h4>
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-[3rem] p-10 shadow-sm border border-slate-100 flex items-center gap-6">
                                            <div className="bg-rose-50 p-4 rounded-2xl text-rose-500">
                                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M5 12h14"/></svg>
                                            </div>
                                            <div>
                                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Pengeluaran</p>
                                                <h4 className="text-2xl font-black text-slate-800">{formatRupiah(stats.expense)}</h4>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-[3rem] p-10 shadow-sm border border-slate-100">
                                        <div className="flex items-center justify-between mb-10">
                                            <h3 className="text-xl font-black text-slate-800 uppercase tracking-tight">TRANSAKSI TERBARU</h3>
                                            <button onClick={() => setActiveTab('history')} className="text-sm font-bold text-blue-600 hover:underline">Lihat Semua</button>
                                        </div>
                                        <div className="space-y-4">
                                            {transactions.length === 0 ? (
                                                <div className="py-20 text-center text-slate-300 font-bold italic uppercase tracking-widest">Belum ada aktivitas...</div>
                                            ) : (
                                                transactions.slice(0, 5).map(t => (
                                                    <div key={t.id} className="flex items-center justify-between p-6 bg-slate-50 rounded-[2rem] hover:bg-white border border-transparent hover:border-slate-100 transition-all group">
                                                        <div className="flex items-center gap-5">
                                                            <div className={`p-4 rounded-2xl ${t.type === 'income' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                                {t.type === 'income' ? '↓' : '↑'}
                                                            </div>
                                                            <div>
                                                                <p className="font-bold text-slate-800 uppercase text-sm tracking-tight">{t.note || t.category}</p>
                                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{t.date} • {t.category}</p>
                                                            </div>
                                                        </div>
                                                        <div className={`text-lg font-black ${t.type === 'income' ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                            {t.type === 'income' ? '+' : '-'}{formatRupiah(t.amount)}
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                </React.Fragment>
                            )}

                            {activeTab === 'history' && (
                                <div className="bg-white rounded-[3rem] p-10 shadow-sm border border-slate-100 animate-in fade-in duration-500">
                                    <div className="space-y-4">
                                        {transactions.length === 0 ? (
                                             <div className="py-20 text-center text-slate-300 font-bold italic uppercase tracking-widest">Belum ada data transaksi.</div>
                                        ) : (
                                            transactions.map(t => (
                                                <div key={t.id} className="flex items-center justify-between p-6 bg-white border border-slate-100 rounded-[2.5rem]">
                                                    <div className="flex items-center gap-5">
                                                        <div className={`p-4 rounded-2xl ${t.type === 'income' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                            {t.type === 'income' ? '↓' : '↑'}
                                                        </div>
                                                        <div>
                                                            <p className="font-bold text-slate-800 uppercase text-sm">{t.note || t.category}</p>
                                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{t.date} • {t.category}</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-6">
                                                        <div className={`text-lg font-black ${t.type === 'income' ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                            {t.type === 'income' ? '+' : '-'}{formatRupiah(t.amount)}
                                                        </div>
                                                        <button onClick={() => deleteTransaction(t.id)} className="text-rose-300 hover:text-rose-500 transition-colors p-2"><IconTrash /></button>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'budget' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 animate-in fade-in duration-500">
                                    {Object.keys(budgets).map(category => {
                                        const spent = stats.catExpenses[category] || 0;
                                        const limit = budgets[category];
                                        const percent = Math.min((spent / limit) * 100, 100);
                                        const isOver = spent > limit;

                                        return (
                                            <div key={category} className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm">
                                                <div className="flex justify-between items-start mb-8">
                                                    <div>
                                                        <h4 className="font-black text-2xl text-slate-900 tracking-tighter uppercase italic">{category}</h4>
                                                        <p className="font-bold text-slate-400 text-[10px] uppercase tracking-widest mt-1">Terpakai: {formatRupiah(spent)}</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <span className="font-black text-slate-800 text-lg">{formatRupiah(limit)}</span>
                                                        <p className="font-bold text-slate-400 text-[10px] uppercase tracking-widest mt-1">Batas</p>
                                                    </div>
                                                </div>
                                                
                                                <div className="w-full bg-slate-100 h-4 rounded-full overflow-hidden mb-6">
                                                    <div 
                                                        className={`h-full transition-all duration-700 ${isOver ? 'bg-rose-500' : percent > 80 ? 'bg-amber-500' : 'bg-blue-600'}`} 
                                                        style={{ width: percent + '%' }}
                                                    ></div>
                                                </div>
                                                
                                                <div className="flex justify-between items-center">
                                                    <p className={`text-xs font-black uppercase tracking-widest ${isOver ? 'text-rose-500' : 'text-blue-600'}`}>
                                                        {isOver ? '🚨 Over Budget!' : percent.toFixed(0) + '% Digunakan'}
                                                    </p>
                                                    {isOver && <span className="text-[10px] font-bold text-rose-500 italic">Segera kurangi pengeluaran!</span>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modal Overlay */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-50 flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-xl rounded-[3.5rem] p-12 animate-in fade-in slide-in-from-bottom-10 duration-300 shadow-2xl">
                                <div className="flex justify-between items-center mb-10">
                                    <h3 className="text-3xl font-black text-slate-900 tracking-tighter italic uppercase">TAMBAH CATATAN</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-slate-100 p-3 rounded-2xl text-slate-400 hover:bg-slate-200 transition-all italic font-bold">✕</button>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-8">
                                    <div className="flex p-2 bg-slate-100 rounded-2xl">
                                        <button 
                                            type="button"
                                            onClick={() => setFormData(Object.assign({}, formData, {type: 'income', category: 'Gaji'}))}
                                            className={`flex-1 py-4 rounded-xl font-black uppercase text-xs tracking-widest transition-all ${formData.type === 'income' ? 'bg-white shadow-md text-emerald-600' : 'text-slate-400'}`}
                                        >Pemasukan</button>
                                        <button 
                                            type="button"
                                            onClick={() => setFormData(Object.assign({}, formData, {type: 'expense', category: 'Makanan'}))}
                                            className={`flex-1 py-4 rounded-xl font-black uppercase text-xs tracking-widest transition-all ${formData.type === 'expense' ? 'bg-white shadow-md text-rose-600' : 'text-slate-400'}`}
                                        >Pengeluaran</button>
                                    </div>
                                    
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Nominal Rupiah</label>
                                        <input 
                                            type="number" 
                                            placeholder="0" 
                                            className="w-full text-5xl font-black px-4 py-6 bg-transparent border-b-4 border-slate-100 focus:border-blue-600 mt-2 transition-all outline-none text-blue-600"
                                            value={formData.amount}
                                            onChange={(e) => setFormData(Object.assign({}, formData, {amount: e.target.value}))}
                                            required
                                        />
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Pilih Kategori</label>
                                        <select 
                                            className="w-full px-6 py-5 bg-slate-50 rounded-2xl mt-2 font-bold text-slate-700 outline-none border-none focus:ring-4 focus:ring-blue-100 appearance-none"
                                            value={formData.category}
                                            onChange={(e) => setFormData(Object.assign({}, formData, {category: e.target.value}))}
                                        >
                                            {CATEGORIES[formData.type].map(cat => (
                                                <option key={cat} value={cat}>{cat}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Keterangan Singkat</label>
                                        <input 
                                            type="text" 
                                            placeholder="Sedang belanja apa?" 
                                            className="w-full px-6 py-5 bg-slate-50 rounded-2xl mt-2 font-bold outline-none border-none focus:ring-4 focus:ring-blue-100"
                                            value={formData.note}
                                            onChange={(e) => setFormData(Object.assign({}, formData, {note: e.target.value}))}
                                        />
                                    </div>

                                    <button className="w-full bg-blue-600 text-white font-black py-6 rounded-[2rem] shadow-2xl shadow-blue-200 text-lg hover:bg-blue-700 transition-all uppercase tracking-widest">SIMPAN DATA</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
