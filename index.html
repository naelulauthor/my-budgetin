<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BudgetinPro">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10433/10433048.png">
    
    <title>Budgetin Pro - Login & Budgeting</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            /* Prevent bounce scrolling on iOS */
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #root {
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .tab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const formatIDR = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n || 0);

        const CATEGORIES = {
            expense: [
                "asuransi", "bayi", "belanja", "buah buahan", "cemilan", "elektronik", 
                "hewan piaraan", "hiburan", "kantor", "kecantikan", "kesehatan", 
                "lain lain", "makanan", "mobil", "motor", "olahraga", "pajak", 
                "pakaian", "pendidikan", "pulsa", "rokok", "rumah", "sosial", 
                "tagihan", "transportasi"
            ],
            income: [
                "deposito", "gaji", "investasi", "lain lain", "pengembalian dana", 
                "penjualan", "penyewaan", "tabungan"
            ]
        };

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [authMode, setAuthMode] = useState('login');
            const [userCreds, setUserCreds] = useState({ username: '', password: '' });
            const [registeredUsers, setRegisteredUsers] = useState(() => {
                const saved = localStorage.getItem('bt_users');
                return saved ? JSON.parse(saved) : [];
            });

            const [activeTab, setActiveTab] = useState('dashboard');
            const [timeFilter, setTimeFilter] = useState('semua');
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('bt_tx');
                return saved ? JSON.parse(saved) : [];
            });
            const [budgets, setBudgets] = useState(() => {
                const saved = localStorage.getItem('bt_bg');
                return saved ? JSON.parse(saved) : { 'makanan': 1000000, 'transportasi': 500000, 'belanja': 1000000 };
            });

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isBudgetEditOpen, setIsBudgetEditOpen] = useState(false);
            const [editingBudget, setEditingBudget] = useState({ category: '', limit: '' });
            const [formData, setFormData] = useState({ type: 'expense', amount: '', category: 'makanan', description: '' });

            useEffect(() => localStorage.setItem('bt_tx', JSON.stringify(transactions)), [transactions]);
            useEffect(() => localStorage.setItem('bt_bg', JSON.stringify(budgets)), [budgets]);
            useEffect(() => localStorage.setItem('bt_users', JSON.stringify(registeredUsers)), [registeredUsers]);

            const filteredTransactions = useMemo(() => {
                if (timeFilter === 'semua') return transactions;
                const now = new Date();
                return transactions.filter(t => {
                    const tDate = new Date(t.timestamp);
                    if (timeFilter === 'harian') return tDate.toDateString() === now.toDateString();
                    if (timeFilter === 'mingguan') {
                        const oneWeekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                        return tDate >= oneWeekAgo;
                    }
                    if (timeFilter === 'bulanan') return tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
                    if (timeFilter === 'tahunan') return tDate.getFullYear() === now.getFullYear();
                    return true;
                });
            }, [transactions, timeFilter]);

            const totals = useMemo(() => {
                return filteredTransactions.reduce((acc, curr) => {
                    const val = Number(curr.amount);
                    if (curr.type === 'income') acc.income += val;
                    else acc.expense += val;
                    acc.balance = acc.income - acc.expense;
                    return acc;
                }, { income: 0, expense: 0, balance: 0 });
            }, [filteredTransactions]);

            const handleAuth = (e) => {
                e.preventDefault();
                if (authMode === 'login') {
                    const user = registeredUsers.find(u => u.username === userCreds.username && u.password === userCreds.password);
                    if (user || (userCreds.username === 'admin' && userCreds.password === 'admin')) setIsLoggedIn(true);
                    else alert('Username atau Password salah!');
                } else {
                    if (registeredUsers.find(u => u.username === userCreds.username)) alert('Username sudah terdaftar!');
                    else {
                        setRegisteredUsers([...registeredUsers, userCreds]);
                        alert('Pendaftaran Berhasil! Silakan Login.');
                        setAuthMode('login');
                    }
                }
            };

            const exportToCSV = () => {
                if (filteredTransactions.length === 0) return alert("Gak ada data buat diekspor bro!");
                const headers = ["Tanggal", "Tipe", "Kategori", "Deskripsi", "Nominal"];
                const rows = filteredTransactions.map(t => [t.date, t.type === 'income' ? 'Pemasukan' : 'Pengeluaran', t.category.toUpperCase(), t.description, t.amount]);
                let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `laporan_${timeFilter}_${new Date().toLocaleDateString()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            if (!isLoggedIn) return (
                <div className="max-w-md mx-auto min-h-screen bg-indigo-600 flex items-center justify-center p-8">
                    <div className="w-full bg-white rounded-[3rem] p-10 shadow-2xl fade-in">
                        <div className="text-center mb-10">
                            <div className="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-4 rotate-12">
                                <Icon name="wallet" size={40} />
                            </div>
                            <h1 className="text-3xl font-black italic tracking-tighter text-indigo-900 uppercase">Budgetin Pro</h1>
                            <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest mt-1">
                                {authMode === 'login' ? 'Selamat Datang Kembali' : 'Buat Akun Baru'}
                            </p>
                        </div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Username</label>
                                <input required type="text" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-indigo-100 font-bold" value={userCreds.username} onChange={e => setUserCreds({...userCreds, username: e.target.value})} />
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Password</label>
                                <input required type="password" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-indigo-100 font-bold" value={userCreds.password} onChange={e => setUserCreds({...userCreds, password: e.target.value})} />
                            </div>
                            <button type="submit" className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-indigo-100 uppercase italic tracking-tighter text-lg active:scale-95 transition-all mt-4">
                                {authMode === 'login' ? 'Masuk' : 'Daftar Sekarang'}
                            </button>
                        </form>
                        <button onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')} className="w-full mt-6 text-[10px] font-black uppercase text-indigo-400 tracking-widest text-center">
                            {authMode === 'login' ? 'Belum punya akun? Daftar' : 'Sudah punya akun? Login'}
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto bg-slate-50 min-h-screen relative pb-24 h-full overflow-y-auto">
                    <div className="bg-white p-6 pt-12 flex justify-between items-center border-b border-slate-100 sticky top-0 z-20">
                        <h2 className="text-xl font-black italic tracking-tighter text-indigo-900">BUDGETIN PRO</h2>
                        <button onClick={() => setIsLoggedIn(false)} className="bg-slate-50 text-slate-400 p-2 rounded-xl"><Icon name="log-out" size={18} /></button>
                    </div>

                    <div className="flex bg-white border-b border-slate-100 sticky top-[89px] z-20">
                        {['dashboard', 'budget', 'history'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-4 text-[10px] font-black uppercase tracking-widest ${activeTab === tab ? 'tab-active' : 'text-slate-300'}`}>
                                {tab}
                            </button>
                        ))}
                    </div>

                    {(activeTab === 'dashboard' || activeTab === 'history') && (
                        <div className="bg-white p-4 flex gap-2 overflow-x-auto no-scrollbar border-b border-slate-50">
                            {['semua', 'harian', 'mingguan', 'bulanan', 'tahunan'].map(f => (
                                <button key={f} onClick={() => setTimeFilter(f)} className={`px-4 py-2 rounded-full text-[9px] font-black uppercase whitespace-nowrap transition-all ${timeFilter === f ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{f}</button>
                            ))}
                        </div>
                    )}

                    {activeTab === 'dashboard' && (
                        <div className="p-6 space-y-6 fade-in">
                            <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl shadow-indigo-100 relative overflow-hidden">
                                <p className="text-[10px] font-bold opacity-60 uppercase tracking-widest mb-1">Saldo ({timeFilter})</p>
                                <h3 className="text-4xl font-black tracking-tighter mb-8">{formatIDR(totals.balance)}</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white/10 p-4 rounded-2xl border border-white/10">
                                        <p className="text-[10px] uppercase font-bold opacity-60 mb-1">Masuk</p>
                                        <p className="font-bold text-emerald-300">{formatIDR(totals.income)}</p>
                                    </div>
                                    <div className="bg-white/10 p-4 rounded-2xl border border-white/10">
                                        <p className="text-[10px] uppercase font-bold opacity-60 mb-1">Keluar</p>
                                        <p className="font-bold text-rose-300">{formatIDR(totals.expense)}</p>
                                    </div>
                                </div>
                            </div>
                            <div className="space-y-4">
                                <h4 className="font-black italic text-slate-800 uppercase text-xs tracking-widest">Aktivitas Terkini</h4>
                                {filteredTransactions.length === 0 ? (
                                    <div className="text-center py-10 text-slate-300 font-bold text-xs uppercase italic">Kosong nih...</div>
                                ) : (
                                    filteredTransactions.slice(0, 5).map(t => (
                                        <div key={t.id} className="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100 shadow-sm">
                                            <div className="flex items-center gap-3">
                                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${t.type === 'income' ? 'bg-emerald-50 text-emerald-500' : 'bg-rose-50 text-rose-500'}`}>
                                                    <Icon name={t.type === 'income' ? 'trending-up' : 'trending-down'} size={18} />
                                                </div>
                                                <div>
                                                    <p className="font-bold text-sm text-slate-800 leading-tight">{t.description}</p>
                                                    <p className="text-[9px] font-black text-slate-300 uppercase tracking-tighter mt-0.5">{t.category}</p>
                                                </div>
                                            </div>
                                            <p className={`font-black text-sm ${t.type === 'income' ? 'text-emerald-500' : 'text-slate-800'}`}>{t.type === 'income' ? '+' : '-'}{formatIDR(t.amount).replace('Rp', '')}</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}

                    {activeTab === 'budget' && (
                        <div className="p-6 space-y-6 fade-in">
                            <div className="flex justify-between items-center">
                                <h4 className="font-black italic text-slate-800 uppercase text-xs tracking-widest">Kontrol Anggaran</h4>
                                <button onClick={() => { setEditingBudget({ category: CATEGORIES.expense[0], limit: '' }); setIsBudgetEditOpen(true); }} className="bg-indigo-600 text-white p-2 rounded-lg shadow-lg shadow-indigo-100"><Icon name="plus" size={16} /></button>
                            </div>
                            {Object.entries(budgets).map(([cat, limit]) => {
                                const spent = transactions.filter(t => t.category === cat && t.type === 'expense').reduce((a, b) => a + b.amount, 0);
                                const percent = Math.min((spent / limit) * 100, 100);
                                return (
                                    <div key={cat} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4 relative">
                                        <button onClick={() => { setEditingBudget({ category: cat, limit: limit }); setIsBudgetEditOpen(true); }} className="absolute top-6 right-6 text-slate-300 hover:text-indigo-500"><Icon name="pencil-line" size={14} /></button>
                                        <div className="flex justify-between items-center pr-8">
                                            <div>
                                                <p className="font-black text-slate-800 uppercase text-xs tracking-tighter">{cat}</p>
                                                <p className="text-[10px] font-bold text-slate-300 italic">LIMIT: {formatIDR(limit)}</p>
                                            </div>
                                            <p className={`font-black text-sm ${percent > 90 ? 'text-rose-500' : 'text-slate-800'}`}>{formatIDR(spent)}</p>
                                        </div>
                                        <div className="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                                            <div className={`h-full transition-all duration-700 ${percent > 90 ? 'bg-rose-500' : 'bg-indigo-500'}`} style={{ width: `${percent}%` }}></div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {activeTab === 'history' && (
                        <div className="p-6 space-y-4 fade-in">
                             <div className="flex justify-between items-center mb-2">
                                <h4 className="font-black italic text-slate-800 uppercase text-xs tracking-widest">Semua Transaksi ({timeFilter})</h4>
                                <button onClick={exportToCSV} className="flex items-center gap-2 bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase hover:bg-emerald-100 transition-colors">
                                    <Icon name="download" size={14} /> Ekspor Excel
                                </button>
                             </div>
                             {filteredTransactions.map(t => (
                                <div key={t.id} className="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${t.type === 'income' ? 'bg-emerald-50 text-emerald-500' : 'bg-rose-50 text-rose-500'}`}>
                                            <Icon name={t.type === 'income' ? 'arrow-up-right' : 'arrow-down-right'} size={18} />
                                        </div>
                                        <div>
                                            <p className="font-bold text-sm text-slate-800 leading-tight">{t.description}</p>
                                            <p className="text-[9px] font-black text-slate-300 uppercase">{t.category} • {t.date}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setTransactions(transactions.filter(x => x.id !== t.id))} className="text-slate-200 hover:text-rose-500 p-1"><Icon name="trash-2" size={14} /></button>
                                </div>
                             ))}
                        </div>
                    )}

                    <button onClick={() => setIsModalOpen(true)} className="fixed bottom-8 right-8 w-16 h-16 bg-indigo-600 text-white rounded-[2rem] shadow-2xl flex items-center justify-center active:scale-90 transition-all z-40 border-4 border-white">
                        <Icon name="plus" size={32} />
                    </button>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-50 flex items-end">
                            <div className="bg-white w-full rounded-t-[3rem] p-8 fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h4 className="text-xl font-black italic uppercase tracking-tighter">Tambah Catatan</h4>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-slate-100 p-2 rounded-xl text-slate-400"><Icon name="x" /></button>
                                </div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const now = new Date();
                                    setTransactions([{ ...formData, id: Date.now(), timestamp: now.toISOString(), date: now.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }), amount: Number(formData.amount) }, ...transactions]);
                                    setIsModalOpen(false);
                                    setFormData({ ...formData, amount: '', description: '' });
                                }} className="space-y-5">
                                    <div className="flex gap-2 p-1.5 bg-slate-100 rounded-2xl">
                                        <button type="button" onClick={() => setFormData({...formData, type:'expense'})} className={`flex-1 py-3 rounded-xl font-black uppercase text-[10px] transition-all ${formData.type === 'expense' ? 'bg-white text-rose-500 shadow-sm' : 'text-slate-400'}`}>Keluar</button>
                                        <button type="button" onClick={() => setFormData({...formData, type:'income'})} className={`flex-1 py-3 rounded-xl font-black uppercase text-[10px] transition-all ${formData.type === 'income' ? 'bg-white text-emerald-500 shadow-sm' : 'text-slate-400'}`}>Masuk</button>
                                    </div>
                                    <input required type="number" placeholder="Nominal" className="w-full text-4xl font-black p-6 bg-slate-50 rounded-[2rem] outline-none" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} />
                                    <select className="w-full p-5 bg-slate-50 rounded-2xl font-bold uppercase text-xs outline-none" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                        {CATEGORIES[formData.type].map(cat => <option key={cat} value={cat}>{cat.toUpperCase()}</option>)}
                                    </select>
                                    <input required type="text" placeholder="Keterangan" className="w-full font-bold p-5 bg-slate-50 rounded-2xl outline-none" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} />
                                    <button type="submit" className="w-full bg-indigo-600 text-white font-black py-6 rounded-[2rem] shadow-xl uppercase italic text-lg">Simpan</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {isBudgetEditOpen && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[60] flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 fade-in shadow-2xl border border-white">
                                <h4 className="text-lg font-black italic uppercase mb-2 tracking-tighter text-indigo-900">Atur Anggaran</h4>
                                <div className="space-y-4 mt-6">
                                    <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold uppercase text-xs outline-none" value={editingBudget.category} onChange={e => setEditingBudget({...editingBudget, category: e.target.value})}>
                                        {CATEGORIES.expense.map(cat => <option key={cat} value={cat}>{cat.toUpperCase()}</option>)}
                                    </select>
                                    <input autoFocus type="number" placeholder="Limit IDR" className="w-full p-5 bg-slate-50 rounded-2xl font-black text-2xl outline-none" value={editingBudget.limit} onChange={e => setEditingBudget({...editingBudget, limit: e.target.value})} />
                                    <div className="flex gap-3 pt-4">
                                        <button onClick={() => setIsBudgetEditOpen(false)} className="flex-1 py-4 bg-slate-100 text-slate-400 font-black rounded-2xl uppercase text-[10px] italic">Batal</button>
                                        <button onClick={() => { setBudgets({...budgets, [editingBudget.category]: Number(editingBudget.limit)}); setIsBudgetEditOpen(false); }} className="flex-[2] py-4 bg-indigo-600 text-white font-black rounded-2xl uppercase text-[10px] italic shadow-lg shadow-indigo-100">Simpan</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
