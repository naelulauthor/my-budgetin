<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budgetin Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const formatIDR = (n) => new Intl.NumberFormat('id-ID', { 
            style: 'currency', 
            currency: 'IDR', 
            minimumFractionDigits: 0 
        }).format(n || 0);

        function App() {
            const [transactions, setTransactions] = useState([
                { id: 1, type: 'expense', amount: 50000, category: 'Makanan', description: 'Makan Siang Bakso', date: 'Hari ini' },
                { id: 2, type: 'income', amount: 2500000, category: 'Gaji', description: 'Gaji Bulanan', date: 'Kemarin' }
            ]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ type: 'expense', amount: '', category: 'Makanan', description: '' });

            const totals = useMemo(() => {
                return transactions.reduce((acc, curr) => {
                    if (curr.type === 'income') acc.income += curr.amount;
                    else acc.expense += curr.amount;
                    acc.balance = acc.income - acc.expense;
                    return acc;
                }, { income: 0, expense: 0, balance: 0 });
            }, [transactions]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.amount || !formData.description) return;
                const newTx = {
                    id: Date.now(),
                    ...formData,
                    amount: Number(formData.amount),
                    date: 'Baru saja'
                };
                setTransactions([newTx, ...transactions]);
                setIsModalOpen(false);
                setFormData({ type: 'expense', amount: '', category: 'Makanan', description: '' });
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen shadow-xl relative flex flex-col overflow-hidden">
                    {/* Header Bag */}
                    <div className="bg-indigo-600 px-6 pt-12 pb-24 rounded-b-[3rem]">
                        <div className="flex justify-between items-center text-white mb-8">
                            <div className="flex items-center gap-3">
                                <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center border border-white/30">
                                    <Icon name="user" size={24} />
                                </div>
                                <div>
                                    <p className="text-xs opacity-60 font-medium">Selamat Datang,</p>
                                    <p className="text-lg font-bold">Budgetin User</p>
                                </div>
                            </div>
                            <div className="bg-white/10 p-2 rounded-xl border border-white/20">
                                <Icon name="bell" size={20} />
                            </div>
                        </div>

                        <div className="text-white text-center">
                            <p className="text-sm opacity-80 mb-1 font-medium">Total Saldo Kamu</p>
                            <h2 className="text-4xl font-extrabold tracking-tight">{formatIDR(totals.balance)}</h2>
                        </div>
                    </div>

                    {/* Stats Box */}
                    <div className="px-6 -mt-16">
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-white p-5 rounded-[2rem] shadow-lg border border-slate-100 flex flex-col items-center">
                                <div className="w-10 h-10 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mb-2">
                                    <Icon name="arrow-down-left" size={20} />
                                </div>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pemasukan</p>
                                <p className="font-bold text-emerald-600">{formatIDR(totals.income)}</p>
                            </div>
                            <div className="bg-white p-5 rounded-[2rem] shadow-lg border border-slate-100 flex flex-col items-center">
                                <div className="w-10 h-10 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mb-2">
                                    <Icon name="arrow-up-right" size={20} />
                                </div>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pengeluaran</p>
                                <p className="font-bold text-rose-600">{formatIDR(totals.expense)}</p>
                            </div>
                        </div>
                    </div>

                    {/* History List */}
                    <div className="flex-1 px-6 mt-8 mb-24 overflow-y-auto">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-lg font-extrabold text-slate-800 italic">RIWAYAT</h3>
                            <button className="text-indigo-600 text-xs font-bold uppercase tracking-tighter">Lihat Semua</button>
                        </div>
                        
                        <div className="space-y-4">
                            {transactions.map(tx => (
                                <div key={tx.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 animate-in">
                                    <div className="flex items-center gap-4">
                                        <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${
                                            tx.type === 'income' ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-600'
                                        }`}>
                                            <Icon name={tx.type === 'income' ? 'plus' : 'shopping-cart'} size={20} />
                                        </div>
                                        <div>
                                            <p className="font-bold text-slate-800 text-sm leading-none mb-1">{tx.description}</p>
                                            <p className="text-[10px] text-slate-400 font-bold uppercase">{tx.category} • {tx.date}</p>
                                        </div>
                                    </div>
                                    <p className={`font-black text-sm ${tx.type === 'income' ? 'text-emerald-600' : 'text-slate-800'}`}>
                                        {tx.type === 'income' ? '+' : '-'}{formatIDR(tx.amount).replace('Rp', '')}
                                    </p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Navigation */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 backdrop-blur-lg border-t border-slate-100 px-8 py-4 flex justify-between items-center">
                        <button className="text-indigo-600 flex flex-col items-center gap-1">
                            <Icon name="home" size={24} />
                            <span className="text-[10px] font-bold uppercase">Home</span>
                        </button>
                        <button 
                            onClick={() => setIsModalOpen(true)}
                            className="w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-indigo-200 -mt-12 border-4 border-white active:scale-90 transition-transform"
                        >
                            <Icon name="plus" size={28} />
                        </button>
                        <button className="text-slate-400 flex flex-col items-center gap-1">
                            <Icon name="settings" size={24} />
                            <span className="text-[10px] font-bold uppercase">Settings</span>
                        </button>
                    </div>

                    {/* Form Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end">
                            <div className="w-full max-w-md mx-auto bg-white rounded-t-[3rem] p-8 animate-in shadow-2xl">
                                <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
                                <h2 className="text-2xl font-black text-slate-800 italic mb-8 tracking-tighter uppercase">Tambah Catatan</h2>
                                
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                                        <button 
                                            type="button" 
                                            onClick={() => setFormData({...formData, type: 'expense'})}
                                            className={`flex-1 py-3 rounded-xl font-bold text-xs uppercase transition-all ${formData.type === 'expense' ? 'bg-white text-rose-500 shadow-sm' : 'text-slate-400'}`}
                                        >Keluar</button>
                                        <button 
                                            type="button" 
                                            onClick={() => setFormData({...formData, type: 'income'})}
                                            className={`flex-1 py-3 rounded-xl font-bold text-xs uppercase transition-all ${formData.type === 'income' ? 'bg-white text-emerald-500 shadow-sm' : 'text-slate-400'}`}
                                        >Masuk</button>
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block">Berapa Duit?</label>
                                        <input 
                                            type="number" 
                                            required
                                            placeholder="0"
                                            className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-100 focus:bg-white rounded-3xl outline-none text-2xl font-bold transition-all"
                                            value={formData.amount}
                                            onChange={e => setFormData({...formData, amount: e.target.value})}
                                        />
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block">Keterangan</label>
                                        <input 
                                            type="text" 
                                            required
                                            placeholder="Contoh: Beli Kopi"
                                            className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-100 focus:bg-white rounded-2xl outline-none font-semibold transition-all"
                                            value={formData.description}
                                            onChange={e => setFormData({...formData, description: e.target.value})}
                                        />
                                    </div>

                                    <div className="flex gap-4">
                                        <button 
                                            type="button"
                                            onClick={() => setIsModalOpen(false)}
                                            className="flex-1 py-5 rounded-[2rem] font-bold text-slate-400 uppercase text-xs"
                                        >Batal</button>
                                        <button 
                                            type="submit"
                                            className="flex-[2] bg-indigo-600 py-5 rounded-[2rem] font-black text-white shadow-xl shadow-indigo-100 active:scale-95 transition-transform uppercase italic tracking-tighter"
                                        >Simpan Catatan</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
