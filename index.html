<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgetin - Kelola Keuangan Gampang</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            overflow-x: hidden;
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // -- HELPER: FORMAT RUPIAH --
        const formatIDR = (num) => {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(num);
        };

        // -- HELPER: ICON RENDERING --
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            // -- STATE: AUTH & DATA --
            const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('budgetin_user')) || null);
            const [isAuthenticated, setIsAuthenticated] = useState(() => localStorage.getItem('budgetin_auth') === 'true');
            const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem('budgetin_txs')) || []);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            // Form State
            const [formData, setFormData] = useState({ 
                type: 'expense', 
                amount: '', 
                category: 'Makanan', 
                description: '', 
                date: new Date().toISOString().split('T')[0] 
            });

            // Sinkronisasi ke Storage
            useEffect(() => {
                localStorage.setItem('budgetin_txs', JSON.stringify(transactions));
                localStorage.setItem('budgetin_auth', isAuthenticated);
                localStorage.setItem('budgetin_user', JSON.stringify(user));
            }, [transactions, isAuthenticated, user]);

            // -- LOGIC: CALCULATIONS --
            const stats = useMemo(() => {
                const income = transactions.filter(t => t.type === 'income').reduce((a, b) => a + Number(b.amount), 0);
                const expense = transactions.filter(t => t.type === 'expense').reduce((a, b) => a + Number(b.amount), 0);
                return { income, expense, balance: income - expense };
            }, [transactions]);

            const handleLogin = (e) => {
                e.preventDefault();
                const name = e.target.username.value;
                setUser(name);
                setIsAuthenticated(true);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.amount || !formData.description) return;
                const newTrx = { ...formData, id: Date.now() };
                setTransactions([newTrx, ...transactions]);
                setIsModalOpen(false);
                setFormData({ type: 'expense', amount: '', category: 'Makanan', description: '', date: new Date().toISOString().split('T')[0] });
            };

            const deleteTrx = (id) => {
                setTransactions(transactions.filter(t => t.id !== id));
            };

            // -- VIEW: LOGIN --
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-blue-600">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md animate-fade-in text-center">
                            <div className="bg-blue-100 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 text-blue-600">
                                <Icon name="wallet" size={40} />
                            </div>
                            <h1 className="text-4xl font-black text-slate-800 tracking-tighter uppercase mb-2">Budgetin</h1>
                            <p className="text-slate-400 mb-8 font-medium">Atur duit kamu jadi lebih gampang!</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    name="username" 
                                    required 
                                    placeholder="Nama panggilan kamu" 
                                    className="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-4 ring-blue-50 font-bold transition-all text-center" 
                                />
                                <button className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-blue-700 active:scale-95 transition-all text-lg uppercase tracking-wider">Mulai Sekarang</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // -- VIEW: DASHBOARD --
            return (
                <div className="flex min-h-screen bg-slate-50 relative">
                    {/* Sidebar Desktop */}
                    <aside className="hidden lg:flex w-72 bg-white border-r border-slate-100 flex-col p-8 fixed h-full">
                        <div className="flex items-center gap-3 text-blue-600 mb-12">
                            <Icon name="zap" className="fill-blue-600" />
                            <span className="text-2xl font-black tracking-tighter uppercase italic">Budgetin</span>
                        </div>
                        <nav className="flex-1 space-y-2">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-400 hover:bg-slate-50'}`}>
                                <Icon name="layout-dashboard" /> Dashboard
                            </button>
                            <button onClick={() => setActiveTab('history')} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all ${activeTab === 'history' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-400 hover:bg-slate-50'}`}>
                                <Icon name="receipt-text" /> Riwayat
                            </button>
                        </nav>
                        <button onClick={() => { localStorage.clear(); location.reload(); }} className="flex items-center gap-4 px-6 py-4 text-rose-500 font-bold hover:bg-rose-50 rounded-2xl transition-all">
                            <Icon name="log-out" /> Logout
                        </button>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 lg:ml-72 p-6 md:p-12 pb-32">
                        <header className="flex justify-between items-center mb-10">
                            <div>
                                <h2 className="text-3xl font-black text-slate-800 tracking-tighter italic uppercase">Dashboard</h2>
                                <p className="text-slate-400 font-medium">Halo, {user}! 👋</p>
                            </div>
                            <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 text-white px-6 py-4 rounded-2xl font-black shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
                                <Icon name="plus" /> <span className="hidden sm:inline">Tambah Catatan</span>
                            </button>
                        </header>

                        {activeTab === 'dashboard' ? (
                            <div className="animate-fade-in space-y-10">
                                {/* Summary Cards */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <div className="bg-blue-600 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                                        <p className="opacity-70 text-[10px] font-black uppercase tracking-[0.2em] mb-1">Total Saldo</p>
                                        <h3 className="text-3xl font-black tracking-tight">{formatIDR(stats.balance)}</h3>
                                        <Icon name="piggy-bank" size={80} className="absolute -right-4 -bottom-4 opacity-10 rotate-12" />
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-50 flex items-center gap-5">
                                        <div className="bg-emerald-50 p-4 rounded-2xl text-emerald-600"><Icon name="trending-up" /></div>
                                        <div>
                                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest">Masuk</p>
                                            <p className="text-xl font-black text-slate-800">{formatIDR(stats.income)}</p>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-50 flex items-center gap-5">
                                        <div className="bg-rose-50 p-4 rounded-2xl text-rose-600"><Icon name="trending-down" /></div>
                                        <div>
                                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest">Keluar</p>
                                            <p className="text-xl font-black text-slate-800">{formatIDR(stats.expense)}</p>
                                        </div>
                                    </div>
                                </div>

                                {/* List Terakhir */}
                                <div className="bg-white p-8 rounded-[3rem] card-shadow border border-slate-50">
                                    <h4 className="font-black text-xl text-slate-800 mb-8 tracking-tight italic uppercase">Transaksi Terakhir</h4>
                                    <div className="space-y-6">
                                        {transactions.length > 0 ? transactions.slice(0, 5).map(t => (
                                            <div key={t.id} className="flex justify-between items-center p-2 hover:bg-slate-50 rounded-2xl transition-all">
                                                <div className="flex items-center gap-4">
                                                    <div className={`p-4 rounded-2xl ${t.type === 'income' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                        <Icon name={t.type === 'income' ? 'arrow-down-left' : 'arrow-up-right'} />
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-slate-800 leading-none mb-1">{t.description}</p>
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{t.category} • {t.date}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <p className={`font-black text-lg ${t.type === 'income' ? 'text-emerald-500' : 'text-slate-800'}`}>
                                                        {t.type === 'income' ? '+' : '-'} {formatIDR(t.amount).replace('Rp', '')}
                                                    </p>
                                                    <button onClick={() => deleteTrx(t.id)} className="text-[10px] font-bold text-rose-300 hover:text-rose-500 uppercase">Hapus</button>
                                                </div>
                                            </div>
                                        )) : (
                                            <div className="text-center py-10">
                                                <p className="text-slate-300 font-bold italic">Belum ada catatan nih...</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="animate-fade-in bg-white p-8 rounded-[3rem] card-shadow border border-slate-50">
                                <h4 className="font-black text-xl text-slate-800 mb-8 tracking-tight italic uppercase">Semua Riwayat</h4>
                                <div className="space-y-4">
                                    {transactions.map(t => (
                                        <div key={t.id} className="flex justify-between items-center p-4 border-b border-slate-50 last:border-0 hover:bg-slate-50 transition-all">
                                            <div className="flex items-center gap-4">
                                                <div className={`p-3 rounded-xl ${t.type === 'income' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                    <Icon name={t.type === 'income' ? 'plus' : 'minus'} size={16} />
                                                </div>
                                                <div>
                                                    <p className="font-bold text-slate-800">{t.description}</p>
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{t.category} • {t.date}</p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <p className={`font-black ${t.type === 'income' ? 'text-emerald-500' : 'text-slate-800'}`}>
                                                    {t.type === 'income' ? '+' : '-'} {formatIDR(t.amount)}
                                                </p>
                                                <button onClick={() => deleteTrx(t.id)} className="text-[10px] font-bold text-rose-400 uppercase">Hapus</button>
                                            </div>
                                        </div>
                                    ))}
                                    {transactions.length === 0 && <p className="text-center py-20 text-slate-300 italic font-bold">Riwayat masih kosong.</p>}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navbar Mobile */}
                    <nav className="lg:hidden fixed bottom-6 left-6 right-6 bg-white/80 backdrop-blur-md border border-white/20 p-4 rounded-[2rem] shadow-2xl flex justify-around items-center z-50">
                        <button onClick={() => setActiveTab('dashboard')} className={`p-4 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-300'}`}>
                            <Icon name="layout-dashboard" />
                        </button>
                        <button onClick={() => setActiveTab('history')} className={`p-4 rounded-2xl transition-all ${activeTab === 'history' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-300'}`}>
                            <Icon name="receipt-text" />
                        </button>
                        <button onClick={() => { localStorage.clear(); location.reload(); }} className="p-4 rounded-2xl text-rose-400">
                            <Icon name="log-out" />
                        </button>
                    </nav>

                    {/* Modal Input */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4 z-[100] animate-fade-in">
                            <div className="bg-white w-full max-w-md rounded-t-[3rem] sm:rounded-[2.5rem] p-10 relative shadow-2xl">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-8 right-8 text-slate-300 hover:text-slate-600"><Icon name="x" /></button>
                                <h3 className="text-2xl font-black text-slate-800 mb-8 tracking-tighter italic uppercase">Input Data</h3>
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div className="flex bg-slate-100 p-2 rounded-2xl">
                                        <button type="button" onClick={() => setFormData({...formData, type: 'expense'})} className={`flex-1 py-3 rounded-xl font-black text-xs uppercase tracking-widest ${formData.type === 'expense' ? 'bg-white shadow-sm text-rose-500' : 'text-slate-400'}`}>Pengeluaran</button>
                                        <button type="button" onClick={() => setFormData({...formData, type: 'income'})} className={`flex-1 py-3 rounded-xl font-black text-xs uppercase tracking-widest ${formData.type === 'income' ? 'bg-white shadow-sm text-emerald-500' : 'text-slate-400'}`}>Pemasukan</button>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Nominal Rupiah</label>
                                        <input 
                                            type="number" 
                                            required 
                                            placeholder="Berapa?" 
                                            className="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-xl outline-none font-black text-2xl text-blue-600" 
                                            value={formData.amount}
                                            onChange={(e) => setFormData({...formData, amount: e.target.value})}
                                        />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Pilih Kategori</label>
                                        <select 
                                            className="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold text-slate-700 appearance-none"
                                            value={formData.category}
                                            onChange={(e) => setFormData({...formData, category: e.target.value})}
                                        >
                                            {formData.type === 'income' ? (
                                                ['Gaji', 'Bonus', 'Investasi', 'Hadiah', 'Lainnya'].map(c => <option key={c} value={c}>{c}</option>)
                                            ) : (
                                                ['Makanan', 'Transportasi', 'Belanja', 'Tagihan', 'Hiburan', 'Lainnya'].map(c => <option key={c} value={c}>{c}</option>)
                                            )}
                                        </select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Keterangan</label>
                                        <input 
                                            type="text" 
                                            required 
                                            placeholder="Contoh: Beli Kopi Senja" 
                                            className="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold"
                                            value={formData.description}
                                            onChange={(e) => setFormData({...formData, description: e.target.value})}
                                        />
                                    </div>
                                    <button className="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-700 active:scale-95 transition-all text-lg uppercase tracking-widest">Simpan Catatan</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
