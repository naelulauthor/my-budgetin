<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budgetin Pro</title>
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel untuk menjalankan UI -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Komponen Icon Lucide
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const formatIDR = (n) => new Intl.NumberFormat('id-ID', { 
            style: 'currency', 
            currency: 'IDR', 
            minimumFractionDigits: 0 
        }).format(n || 0);

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [transactions, setTransactions] = useState([
                { id: 1, type: 'expense', amount: 50000, category: 'Makanan', description: 'Makan Siang Bakso', date: new Date() },
                { id: 2, type: 'income', amount: 1500000, category: 'Freelance', description: 'Project Logo', date: new Date() }
            ]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ type: 'expense', amount: '', category: 'Makanan', description: '' });

            const totals = useMemo(() => {
                return transactions.reduce((acc, curr) => {
                    if (curr.type === 'income') acc.income += curr.amount;
                    else acc.expense += curr.amount;
                    acc.balance = acc.income - acc.expense;
                    return acc;
                }, { income: 0, expense: 0, balance: 0 });
            }, [transactions]);

            const addTransaction = (e) => {
                e.preventDefault();
                const newTx = {
                    id: Date.now(),
                    ...formData,
                    amount: Number(formData.amount),
                    date: new Date()
                };
                setTransactions([newTx, ...transactions]);
                setIsModalOpen(false);
                setFormData({ type: 'expense', amount: '', category: 'Makanan', description: '' });
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative flex flex-col">
                    
                    {/* Header & Card */}
                    <div className="bg-indigo-600 pt-10 pb-20 px-6 rounded-b-[2.5rem] shadow-lg">
                        <div className="flex justify-between items-center text-white mb-8">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                                    <Icon name="user" size={20} />
                                </div>
                                <div>
                                    <p className="text-[10px] uppercase font-bold opacity-60">Halo, Bro!</p>
                                    <p className="font-bold leading-none">Budgetin User</p>
                                </div>
                            </div>
                            <button className="relative p-2 bg-white/10 rounded-xl">
                                <Icon name="bell" size={20} />
                                <span className="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full border-2 border-indigo-600"></span>
                            </button>
                        </div>

                        <div className="text-white">
                            <p className="text-xs font-semibold opacity-70 mb-1">Total Saldo Kamu</p>
                            <h2 className="text-4xl font-extrabold tracking-tight mb-6">{formatIDR(totals.balance)}</h2>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white/10 backdrop-blur-md p-4 rounded-3xl border border-white/20">
                                    <div className="flex items-center gap-2 mb-2">
                                        <div className="p-1 bg-emerald-500/20 rounded-lg text-emerald-400">
                                            <Icon name="trending-up" size={14} />
                                        </div>
                                        <p className="text-[10px] font-bold uppercase opacity-70">Masuk</p>
                                    </div>
                                    <p className="font-bold text-emerald-300">{formatIDR(totals.income)}</p>
                                </div>
                                <div className="bg-white/10 backdrop-blur-md p-4 rounded-3xl border border-white/20">
                                    <div className="flex items-center gap-2 mb-2">
                                        <div className="p-1 bg-rose-500/20 rounded-lg text-rose-400">
                                            <Icon name="trending-down" size={14} />
                                        </div>
                                        <p className="text-[10px] font-bold uppercase opacity-70">Keluar</p>
                                    </div>
                                    <p className="font-bold text-rose-300">{formatIDR(totals.expense)}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Transaction List */}
                    <div className="flex-1 px-6 -mt-10 mb-24">
                        <div className="bg-white rounded-[2rem] p-6 shadow-xl border border-slate-50">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-extrabold text-slate-800">Riwayat Terakhir</h3>
                                <Icon name="sliders-horizontal" size={18} className="text-slate-400" />
                            </div>

                            <div className="space-y-5">
                                {transactions.map(tx => (
                                    <div key={tx.id} className="flex items-center justify-between group">
                                        <div className="flex items-center gap-4">
                                            <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${
                                                tx.type === 'income' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'
                                            }`}>
                                                <Icon name={tx.type === 'income' ? 'plus-circle' : 'shopping-bag'} size={22} />
                                            </div>
                                            <div>
                                                <p className="font-bold text-slate-900 leading-tight">{tx.description}</p>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase mt-1">{tx.category}</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <p className={`font-bold ${tx.type === 'income' ? 'text-emerald-500' : 'text-slate-900'}`}>
                                                {tx.type === 'income' ? '+' : '-'}{formatIDR(tx.amount).replace('Rp', '')}
                                            </p>
                                            <p className="text-[10px] text-slate-300 font-medium">Hari ini</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Bottom Navigation */}
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[360px] bg-slate-900/90 backdrop-blur-xl rounded-[2.5rem] p-4 flex justify-between items-center shadow-2xl z-40 border border-white/10">
                        <button onClick={() => setActiveTab('home')} className={`p-3 rounded-2xl transition-all ${activeTab === 'home' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500'}`}>
                            <Icon name="layout-grid" />
                        </button>
                        <button onClick={() => setIsModalOpen(true)} className="w-14 h-14 bg-indigo-500 text-white rounded-full flex items-center justify-center shadow-xl shadow-indigo-500/40 -mt-12 border-4 border-white active:scale-90 transition-all">
                            <Icon name="plus" size={28} />
                        </button>
                        <button onClick={() => setActiveTab('user')} className={`p-3 rounded-2xl transition-all ${activeTab === 'user' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500'}`}>
                            <Icon name="user" />
                        </button>
                    </div>

                    {/* Modal Input */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end">
                            <div className="w-full max-w-md mx-auto bg-white rounded-t-[3rem] p-8 animate-pop">
                                <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-extrabold italic text-slate-800 tracking-tight">BUAT CATATAN</h2>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-slate-100 p-2 rounded-xl text-slate-400">
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>

                                <form onSubmit={addTransaction} className="space-y-6">
                                    <div className="flex p-1 bg-slate-100 rounded-2xl">
                                        <button 
                                            type="button"
                                            onClick={() => setFormData({...formData, type: 'expense'})}
                                            className={`flex-1 py-3 rounded-xl font-bold uppercase text-xs transition-all ${formData.type === 'expense' ? 'bg-white shadow text-rose-500' : 'text-slate-400'}`}
                                        >Keluar</button>
                                        <button 
                                            type="button"
                                            onClick={() => setFormData({...formData, type: 'income'})}
                                            className={`flex-1 py-3 rounded-xl font-bold uppercase text-xs transition-all ${formData.type === 'income' ? 'bg-white shadow text-emerald-500' : 'text-slate-400'}`}
                                        >Masuk</button>
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2">Nominal</label>
                                        <input 
                                            autoFocus
                                            required
                                            type="number" 
                                            placeholder="0" 
                                            className="w-full text-4xl font-black p-4 bg-slate-50 rounded-3xl outline-none focus:bg-white border-2 border-transparent focus:border-indigo-100 transition-all"
                                            value={formData.amount}
                                            onChange={e => setFormData({...formData, amount: e.target.value})}
                                        />
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2">Untuk Apa?</label>
                                        <input 
                                            required
                                            type="text" 
                                            placeholder="Contoh: Makan Siang" 
                                            className="w-full font-bold p-5 bg-slate-50 rounded-2xl outline-none focus:bg-white border-2 border-transparent focus:border-indigo-100 transition-all"
                                            value={formData.description}
                                            onChange={e => setFormData({...formData, description: e.target.value})}
                                        />
                                    </div>

                                    <button type="submit" className="w-full bg-indigo-600 text-white font-black py-5 rounded-[2rem] shadow-xl shadow-indigo-200 active:scale-95 transition-all uppercase italic tracking-tighter">
                                        Simpan Sekarang
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
