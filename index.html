<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budgetin Pro - Login & Budgeting</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .tab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const formatIDR = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n || 0);

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [userCreds, setUserCreds] = useState({ username: '', password: '' });
            const [activeTab, setActiveTab] = useState('dashboard'); // dashboard, budget, history
            
            // State Utama
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('bt_tx');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [budgets, setBudgets] = useState(() => {
                const saved = localStorage.getItem('bt_bg');
                return saved ? JSON.parse(saved) : { 'Makanan': 1000000, 'Transportasi': 500000, 'Hiburan': 300000 };
            });

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ type: 'expense', amount: '', category: 'Makanan', description: '' });

            // Persist Data
            useEffect(() => localStorage.setItem('bt_tx', JSON.stringify(transactions)), [transactions]);
            useEffect(() => localStorage.setItem('bt_bg', JSON.stringify(budgets)), [budgets]);

            const totals = useMemo(() => {
                return transactions.reduce((acc, curr) => {
                    const val = Number(curr.amount);
                    if (curr.type === 'income') acc.income += val;
                    else acc.expense += val;
                    acc.balance = acc.income - acc.expense;
                    return acc;
                }, { income: 0, expense: 0, balance: 0 });
            }, [transactions]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (userCreds.username && userCreds.password) setIsLoggedIn(true);
            };

            const exportToCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,Tanggal,Tipe,Kategori,Deskripsi,Nominal\n";
                transactions.forEach(t => {
                    csvContent += `${t.date},${t.type},${t.category},${t.description},${t.amount}\n`;
                });
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `budgetin_report_${new Date().toLocaleDateString()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            if (!isLoggedIn) return (
                <div className="max-w-md mx-auto min-h-screen bg-indigo-600 flex items-center justify-center p-8">
                    <div className="w-full bg-white rounded-[3rem] p-10 shadow-2xl animate-in slide-in-from-bottom duration-500">
                        <div className="text-center mb-10">
                            <div className="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-4 rotate-12">
                                <Icon name="wallet" size={40} />
                            </div>
                            <h1 className="text-3xl font-black italic tracking-tighter text-indigo-900">BUDGETIN PRO</h1>
                            <p className="text-slate-400 font-bold text-xs uppercase tracking-widest mt-1">Atur Duit Gak Pake Ribet</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input required type="text" placeholder="Username" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-indigo-100 font-bold" value={userCreds.username} onChange={e => setUserCreds({...userCreds, username: e.target.value})} />
                            <input required type="password" placeholder="Password" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-indigo-100 font-bold" value={userCreds.password} onChange={e => setUserCreds({...userCreds, password: e.target.value})} />
                            <button type="submit" className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-indigo-100 uppercase italic tracking-tighter text-lg active:scale-95 transition-all">Masuk Sekarang</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto bg-slate-50 min-h-screen relative pb-24">
                    {/* Header */}
                    <div className="bg-white p-6 pt-12 flex justify-between items-center border-b border-slate-100 sticky top-0 z-20">
                        <h2 className="text-xl font-black italic tracking-tighter text-indigo-900">BUDGETIN PRO</h2>
                        <button onClick={exportToCSV} className="bg-emerald-100 text-emerald-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-2">
                            <Icon name="file-spreadsheet" size={14} /> Ekspor Sheets
                        </button>
                    </div>

                    {/* Navigation Tab */}
                    <div className="flex bg-white border-b border-slate-100">
                        {['dashboard', 'budget', 'history'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-4 text-[10px] font-black uppercase tracking-widest ${activeTab === tab ? 'tab-active' : 'text-slate-300'}`}>
                                {tab}
                            </button>
                        ))}
                    </div>

                    {activeTab === 'dashboard' && (
                        <div className="p-6 space-y-6 animate-in fade-in duration-300">
                            {/* Balance Card */}
                            <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl shadow-indigo-100">
                                <p className="text-[10px] font-bold opacity-60 uppercase tracking-widest mb-1">Total Saldo Kamu</p>
                                <h3 className="text-4xl font-black tracking-tighter mb-8">{formatIDR(totals.balance)}</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white/10 p-4 rounded-2xl border border-white/10">
                                        <p className="text-[10px] uppercase font-bold opacity-60 mb-1">Income</p>
                                        <p className="font-bold text-emerald-300">{formatIDR(totals.income)}</p>
                                    </div>
                                    <div className="bg-white/10 p-4 rounded-2xl border border-white/10">
                                        <p className="text-[10px] uppercase font-bold opacity-60 mb-1">Expense</p>
                                        <p className="font-bold text-rose-300">{formatIDR(totals.expense)}</p>
                                    </div>
                                </div>
                            </div>

                            {/* Recent List */}
                            <div className="space-y-4">
                                <h4 className="font-black italic text-slate-800 uppercase text-xs tracking-widest">Transaksi Terbaru</h4>
                                {transactions.slice(0, 5).map(t => (
                                    <div key={t.id} className="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100 shadow-sm">
                                        <div className="flex items-center gap-3">
                                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${t.type === 'income' ? 'bg-emerald-50 text-emerald-500' : 'bg-rose-50 text-rose-500'}`}>
                                                <Icon name={t.type === 'income' ? 'plus' : 'shopping-bag'} size={18} />
                                            </div>
                                            <div>
                                                <p className="font-bold text-sm text-slate-800">{t.description}</p>
                                                <p className="text-[10px] font-bold text-slate-300 uppercase">{t.category}</p>
                                            </div>
                                        </div>
                                        <p className={`font-black ${t.type === 'income' ? 'text-emerald-500' : 'text-slate-800'}`}>
                                            {t.type === 'income' ? '+' : '-'}{formatIDR(t.amount).replace('Rp', '')}
                                        </p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'budget' && (
                        <div className="p-6 space-y-6 animate-in slide-in-from-right duration-300">
                            <h4 className="font-black italic text-slate-800 uppercase text-xs tracking-widest">Sistem Anggaran</h4>
                            {Object.entries(budgets).map(([cat, limit]) => {
                                const spent = transactions.filter(t => t.category === cat && t.type === 'expense').reduce((a, b) => a + b.amount, 0);
                                const percent = Math.min((spent / limit) * 100, 100);
                                return (
                                    <div key={cat} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                        <div className="flex justify-between items-center mb-4">
                                            <p className="font-black text-slate-800">{cat}</p>
                                            <p className="text-[10px] font-bold text-indigo-600 uppercase">Limit: {formatIDR(limit)}</p>
                                        </div>
                                        <div className="w-full h-3 bg-slate-100 rounded-full overflow-hidden mb-2">
                                            <div className={`h-full transition-all duration-1000 ${percent > 90 ? 'bg-rose-500' : 'bg-indigo-500'}`} style={{ width: `${percent}%` }}></div>
                                        </div>
                                        <div className="flex justify-between items-center text-[10px] font-bold uppercase">
                                            <span className="text-slate-400">Terpakai: {formatIDR(spent)}</span>
                                            <span className={percent > 90 ? 'text-rose-500' : 'text-slate-400'}>{Math.round(percent)}%</span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {activeTab === 'history' && (
                        <div className="p-6 space-y-4 animate-in slide-in-from-right duration-300">
                             <h4 className="font-black italic text-slate-800 uppercase text-xs tracking-widest">Semua Catatan</h4>
                             {transactions.map(t => (
                                <div key={t.id} className="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${t.type === 'income' ? 'bg-emerald-50 text-emerald-500' : 'bg-rose-50 text-rose-500'}`}>
                                            <Icon name={t.type === 'income' ? 'plus' : 'shopping-bag'} size={18} />
                                        </div>
                                        <div>
                                            <p className="font-bold text-sm text-slate-800">{t.description}</p>
                                            <p className="text-[10px] font-bold text-slate-300 uppercase">{t.date}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setTransactions(transactions.filter(x => x.id !== t.id))} className="text-rose-200 hover:text-rose-500 transition-colors">
                                        <Icon name="trash-2" size={16} />
                                    </button>
                                </div>
                             ))}
                        </div>
                    )}

                    {/* Floating Add Button */}
                    <button onClick={() => setIsModalOpen(true)} className="fixed bottom-8 right-8 w-16 h-16 bg-indigo-600 text-white rounded-[2rem] shadow-2xl shadow-indigo-300 flex items-center justify-center active:scale-90 transition-all z-40">
                        <Icon name="plus" size={32} />
                    </button>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end">
                            <div className="bg-white w-full rounded-t-[3rem] p-8 animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center mb-8">
                                    <h4 className="text-xl font-black italic uppercase">Input Data</h4>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-slate-100 p-2 rounded-xl text-slate-400"><Icon name="x" /></button>
                                </div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const newTx = { ...formData, id: Date.now(), date: new Date().toLocaleDateString('id-ID'), amount: Number(formData.amount) };
                                    setTransactions([newTx, ...transactions]);
                                    setIsModalOpen(false);
                                    setFormData({ type: 'expense', amount: '', category: 'Makanan', description: '' });
                                }} className="space-y-6">
                                    <div className="flex gap-2 p-1 bg-slate-100 rounded-2xl">
                                        <button type="button" onClick={() => setFormData({...formData, type:'expense'})} className={`flex-1 py-3 rounded-xl font-bold uppercase text-xs transition-all ${formData.type === 'expense' ? 'bg-white shadow-sm text-rose-500' : 'text-slate-400'}`}>Keluar</button>
                                        <button type="button" onClick={() => setFormData({...formData, type:'income'})} className={`flex-1 py-3 rounded-xl font-bold uppercase text-xs transition-all ${formData.type === 'income' ? 'bg-white shadow-sm text-emerald-500' : 'text-slate-400'}`}>Masuk</button>
                                    </div>
                                    <input required type="number" placeholder="Nominal" className="w-full text-3xl font-black p-6 bg-slate-50 rounded-3xl outline-none" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} />
                                    <select className="w-full p-5 bg-slate-50 rounded-2xl font-bold outline-none" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                        <option value="Makanan">Makanan</option>
                                        <option value="Transportasi">Transportasi</option>
                                        <option value="Hiburan">Hiburan</option>
                                        <option value="Gaji">Gaji / Freelance</option>
                                    </select>
                                    <input required type="text" placeholder="Keterangan" className="w-full font-bold p-5 bg-slate-50 rounded-2xl outline-none" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} />
                                    <button type="submit" className="w-full bg-indigo-600 text-white font-black py-5 rounded-3xl shadow-xl uppercase italic text-lg">Simpan</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
